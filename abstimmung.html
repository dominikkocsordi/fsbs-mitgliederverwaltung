<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Abstimmung · FSBS</title>
  <meta name="theme-color" content="#061827">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">

  <style>
    /* ============================================================
       Abstimmung (Public Voting) local styles
       ============================================================ */
    :root {
      --green-light: rgba(74, 222, 128, 0.95);
      --green-deep:  rgba(22, 163, 74, 0.80);
      --red-light:   rgba(248, 113, 113, 0.95);
      --red-deep:    rgba(220, 38, 38, 0.80);
      --glow-color:  rgba(99, 102, 241, 0.60);
      --anim-color-light: var(--green-light);
      --anim-color-deep:  var(--green-deep);
    }

    /* Fixed gradient background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(135deg, #0d0921, #0a1628, #130d22);
    }

    /* Radial glow effect */
    .radial-glow {
      position: fixed;
      inset: 0;
      z-index: -1;
      --glow-color: rgba(99, 102, 241, 0.60);
      background: radial-gradient(circle at 50% 50%, var(--glow-color), transparent 65%);
      transition: background 1s ease;
      pointer-events: none;
    }

    /* Main wrap */
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .wrap > .glass {
      width: min(520px, 100%);
      padding: 32px 28px;
    }

    /* Code entry */
    .code-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 16px 0;
    }
    .code-input {
      width: 52px;
      height: 60px;
      border-radius: 14px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      padding: 0;
    }

    /* Primary button for voting page */
    .btnPrimary {
      display: block;
      width: 100%;
      padding: 14px 24px;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #0f0b16;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.16s ease, filter 0.16s ease, opacity 0.16s ease;
      box-shadow: 0 12px 30px rgba(168,85,247,0.25);
    }
    .btnPrimary:not(:disabled):hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }
    .btnPrimary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Vote option buttons */
    .optBtn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .optBtn:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.22);
    }
    .optBtn.selected {
      background: rgba(249,115,22,0.18);
      border-color: rgba(249,115,22,0.40);
    }

    /* Step buttons for delegation count */
    .countStepper {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stepBtn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      transition: background 0.14s;
    }
    .stepBtn:hover:not(:disabled) { background: rgba(255,255,255,0.18); }
    .stepBtn:disabled { opacity: 0.35; cursor: not-allowed; }
    .countDisplay {
      font-size: 20px;
      font-weight: 800;
      min-width: 28px;
      text-align: center;
    }

    /* Delegation section */
    .delegationSection {
      margin-top: 20px;
      padding: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
    }
    .delegationTitle {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .delegationCountRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .delegationNames {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .delegationNameInput {
      width: 100%;
    }

    /* Animation container */
    .anim-container {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    /* Loader ring animation */
    .loader-ring {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--anim-color-light);
      opacity: 0;
      transform: scale(0.5) rotate(0deg);
      box-shadow: 0 0 30px var(--anim-color-light);
    }

    /* White flash */
    .white-flash {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: white;
      opacity: 0;
      transform: scale(0.5);
    }

    /* Shockwave */
    .shockwave {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--anim-color-light);
      opacity: 0;
      transform: scale(0.5);
    }

    /* Main icon */
    .main-icon {
      position: absolute;
      width: 80px;
      height: 80px;
      opacity: 0;
      transform: scale(0.5);
    }
    .main-icon svg {
      width: 100%;
      height: 100%;
    }

    /* Ambient glow for animation */
    .ambient-glow {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.8);
      background: radial-gradient(circle, var(--anim-color-light), transparent 70%);
    }

    @keyframes pulseAmbient {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.15); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Animation text block */
    .anim-text {
      position: fixed;
      bottom: 15%;
      left: 0;
      right: 0;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
    }
    .anim-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }
    .anim-sub {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="radial-glow" id="bgGlow"></div>

  <div class="wrap" id="mainWrap">
    <div id="loadingState" class="pageLoader" style="background:transparent;">
      <div class="spinnerRing"></div>
      <span>Abstimmung wird geladen…</span>
    </div>
  </div>

<script>
  // Falls das Skript komplett abstürzt, zeigt dieser Block das Problem SOFORT auf dem Display
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    var wrap = document.getElementById("mainWrap");
    if(wrap) {
      wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
        '<div style="font-size:40px; margin-bottom:10px;">⚠️</div>' +
        '<h2 style="font-size:20px; font-weight:800; color:var(--red-light); margin-bottom:8px;">System-Fehler</h2>' +
        '<p style="color:var(--muted); font-size:13px;">' + msg + '</p>' +
        '<p style="color:var(--muted); font-size:11px; margin-top:8px;">Zeile: ' + lineNo + '</p></div>';
    }
    return false;
  };

  const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
  const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
  
  let sb;
  try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) {
      throw new Error("Datenbank-Treiber fehlt. Evtl. blockiert ein Adblocker die Supabase-Verbindung.");
  }

  const wrap = document.getElementById("mainWrap");
  let currentSession = null;
  let voterCode = null;

  function getToken() { return new URLSearchParams(location.search).get("s"); }

  function getVoterToken(sessionToken) {
    const key = "vt_" + sessionToken;
    let vt = sessionStorage.getItem(key);
    if (!vt) { 
      vt = (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') 
            ? crypto.randomUUID() 
            : Math.random().toString(36).substring(2) + Date.now().toString(36);
      sessionStorage.setItem(key, vt); 
    }
    return vt;
  }

  function escapeHTML(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function showBlockedState() {
    wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
      '<div style="font-size:40px; margin-bottom:10px;">🔒</div>' +
      '<h2 style="font-size:24px; font-weight:800; color:var(--red-light);">Bereits abgestimmt</h2>' +
      '<p style="color:var(--muted); font-size:14px; margin-top:8px;">Du hast an dieser Abstimmung bereits teilgenommen.</p>' +
      '</div>';
  }

  function playTheatricalAnimation(type, callback) {
    const isTxtOpen = type === 'open';
    const titleText = isTxtOpen ? 'Wahl eröffnet' : 'Wahl geschlossen';
    const subText = isTxtOpen ? 'STIMMABGABE FREIGEGEBEN' : 'KEINE WEITEREN STIMMEN';
    
    const iconGreen = '<svg viewBox="0 0 24 24" fill="url(#gradGreen)"><defs><linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="var(--green-light)"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
    const iconRed = '<svg viewBox="0 0 24 24" fill="url(#gradRed)"><defs><linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="var(--red-light)"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';
    const iconSvg = isTxtOpen ? iconGreen : iconRed;

    wrap.innerHTML = '<div class="anim-container" id="animBox" style="display:flex;">' +
      '<div class="ambient-glow" id="aGlow"></div>' +
      '<div class="loader-ring" id="aLoader"></div>' +
      '<div class="white-flash" id="aFlash"></div>' +
      '<div class="shockwave" id="aShock"></div>' +
      '<div class="main-icon" id="aIcon">' + iconSvg + '</div>' +
      '</div>' +
      '<div class="anim-text" id="aText">' +
      '<div class="anim-title">' + titleText + '</div>' +
      '<div class="anim-sub">' + subText + '</div>' +
      '</div>';

    const root = document.documentElement;
    if(type === 'open') {
      root.style.setProperty('--anim-color-light', 'var(--green-light)');
      root.style.setProperty('--anim-color-deep', 'var(--green-deep)');
      document.getElementById("bgGlow").style.setProperty('--glow-color', 'var(--green-deep)');
    } else {
      root.style.setProperty('--anim-color-light', 'var(--red-light)');
      root.style.setProperty('--anim-color-deep', 'var(--red-deep)');
      document.getElementById("bgGlow").style.setProperty('--glow-color', 'var(--red-deep)');
    }

    const loader = document.getElementById("aLoader");
    const flash = document.getElementById("aFlash");
    const shock = document.getElementById("aShock");
    const icon = document.getElementById("aIcon");
    const glow = document.getElementById("aGlow");
    const text = document.getElementById("aText");

    loader.style.transition = "opacity 0.15s ease-out, transform 2.7s ease-in-out";
    setTimeout(() => { loader.style.opacity = "1"; loader.style.transform = "scale(1) rotate(450deg)"; }, 50);

    setTimeout(() => {
      loader.style.transition = "transform 0.3s ease-in, opacity 0.3s ease-in";
      loader.style.transform = "scale(0.01) rotate(500deg)";
      loader.style.opacity = "0";
    }, 2700);

    setTimeout(() => {
      flash.style.opacity = "1"; flash.style.transition = "transform 0.5s ease-out, opacity 0.5s ease-out";
      setTimeout(() => { flash.style.transform = "scale(4)"; flash.style.opacity = "0"; }, 50);

      shock.style.opacity = "1"; shock.style.transition = "transform 0.8s ease-out, opacity 0.8s ease-out";
      setTimeout(() => { shock.style.transform = "scale(3.5)"; shock.style.opacity = "0"; }, 50);

      icon.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      icon.style.opacity = "1"; icon.style.transform = "scale(1)";
      
      glow.style.transition = "opacity 0.5s ease"; glow.style.opacity = "0.5"; glow.style.transform = "scale(1)";
      glow.style.animation = "pulseAmbient 3s infinite ease-in-out 0.4s";

      setTimeout(() => {
        text.style.transition = "transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s ease";
        text.style.opacity = "1"; text.style.transform = "translateY(0)";
      }, 100);

      if(callback) setTimeout(callback, 2500);
    }, 3000);
  }

  function showCodeEntry() {
    wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
      '<h2 style="font-size:24px; font-weight:800; margin-bottom: 8px;">Wahl-Zugang</h2>' +
      '<p style="color:var(--muted); font-size:14px; margin-bottom: 24px;">Bitte gib deinen 5-stelligen Code ein.</p>' +
      '<div class="code-container" id="codeInputs">' +
      '<input type="text" maxlength="1" class="code-input" autofocus>' +
      '<input type="text" maxlength="1" class="code-input">' +
      '<input type="text" maxlength="1" class="code-input">' +
      '<input type="text" maxlength="1" class="code-input">' +
      '<input type="text" maxlength="1" class="code-input">' +
      '</div>' +
      '<div id="codeError" style="color:var(--red-light); font-size:14px; min-height:20px; margin-top:10px;"></div>' +
      '<button class="btnPrimary" id="verifyBtn">Code verifizieren</button>' +
      '</div>';

    const inputs = document.querySelectorAll('.code-input');
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        input.value = input.value.toUpperCase();
        if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
      });
    });

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const code = Array.from(inputs).map(i => i.value).join('');
      if(code.length !== 5) return;
      
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = "Prüfe...";
      
      const { data: codeData, error: codeErr } = await sb.from("voter_codes")
        .select("*").in("group_id", currentSession.activeGroups).eq("code", code).maybeSingle();
        
      if(!codeData || codeErr) {
        document.getElementById('codeError').textContent = "Dieser Code ist für diese Wahl nicht gültig.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      const { data: voteData } = await sb.from("votes")
        .select("id").eq("session_id", currentSession.id).eq("voter_code", code).maybeSingle();

      if(voteData) {
        document.getElementById('codeError').textContent = "Mit diesem Code wurde bereits abgestimmt.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      voterCode = code; 
      playTheatricalAnimation('open', showVotingOptions);
    });
  }

  function showVotingOptions() {
    const opts = currentSession.options || [];
    const allowDelegation = !!currentSession.allow_delegation;
    let selected = null;
    let delegationCount = 0;

    let delegationHtml = "";
    if (allowDelegation) {
        delegationHtml = '<div class="delegationSection" id="delegationSection">' +
          '<div class="delegationTitle">🔄 Stimmübertragungen</div>' +
          '<div class="delegationCountRow">' +
          '<label>Anzahl übertragener Stimmen:</label>' +
          '<div class="countStepper">' +
          '<button class="stepBtn" id="stepMinus" type="button" disabled>−</button>' +
          '<span class="countDisplay" id="countDisplay">0</span>' +
          '<button class="stepBtn" id="stepPlus" type="button">+</button>' +
          '</div></div>' +
          '<div class="delegationNames" id="delegationNames"></div></div>';
    }

    let optsHtml = "";
    for (let i = 0; i < opts.length; i++) {
        optsHtml += '<button class="optBtn" data-i="' + i + '">' +
          '<div style="width:24px; height:24px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0;" class="radio-circle"></div>' +
          escapeHTML(opts[i]) +
          '</button>';
    }

    wrap.innerHTML = '<div class="glass" style="animation: fadeUp 0.6s ease;">' +
      '<h2 style="font-size:26px; font-weight:800; margin-bottom: 6px;">' + escapeHTML(currentSession.title) + '</h2>' +
      '<p style="color:var(--muted); font-size:14px; margin-bottom: 30px;">Wähle eine Option und bestätige.</p>' +
      '<div id="optList">' + optsHtml + '</div>' +
      delegationHtml +
      '<button class="btnPrimary" id="submitVote" disabled>Stimme abgeben</button>' +
      '<div id="vMsg" style="margin-top:12px; font-size:13px; color:var(--red-light); text-align:center;"></div>' +
      '</div>';

    const submitBtn = document.getElementById("submitVote");
    const vMsg = document.getElementById("vMsg");

    function updateSubmitLabel() {
      if (selected === null) return;
      const total = 1 + delegationCount;
      const optText = opts[selected];
      submitBtn.textContent = total > 1 ? '„' + optText + '“ wählen (' + total + ' Stimmen)' : '„' + optText + '“ wählen';
    }

    function updateDelegationNames() {
      if (!allowDelegation) return;
      const container = document.getElementById("delegationNames");
      const existing = container.querySelectorAll(".delegationNameInput");
      const currentCount = existing.length;
      if (delegationCount > currentCount) {
        for (let i = currentCount; i < delegationCount; i++) {
          const inp = document.createElement("input"); 
          inp.type = "text"; 
          inp.className = "delegationNameInput";
          inp.placeholder = "Name der " + (i + 1) + ". übertragenden Person"; 
          inp.maxLength = 80; 
          container.appendChild(inp);
        }
      } else {
        for (let i = currentCount; i > delegationCount; i--) { 
          container.removeChild(container.lastChild); 
        }
      }
      document.getElementById("stepMinus").disabled = delegationCount <= 0;
      document.getElementById("countDisplay").textContent = delegationCount;
      updateSubmitLabel();
    }

    if (allowDelegation) {
      document.getElementById("stepPlus").addEventListener("click", () => { if (delegationCount >= 9) return; delegationCount++; updateDelegationNames(); });
      document.getElementById("stepMinus").addEventListener("click", () => { if (delegationCount <= 0) return; delegationCount--; updateDelegationNames(); });
    }

    document.querySelectorAll(".optBtn").forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(".optBtn").forEach(b => { 
            b.classList.remove('selected'); 
            b.querySelector('.radio-circle').style.borderColor = "var(--border)"; 
            b.querySelector('.radio-circle').innerHTML = ""; 
        });
        btn.classList.add('selected'); 
        btn.querySelector('.radio-circle').style.borderColor = "var(--accent1)";
        btn.querySelector('.radio-circle').innerHTML = '<div style="width:12px; height:12px; background:var(--accent1); border-radius:50%;"></div>';
        selected = parseInt(btn.getAttribute('data-i')); 
        submitBtn.disabled = false; 
        updateSubmitLabel();
      });
    });

    submitBtn.addEventListener('click', async () => {
      if (selected === null) return;

      let delegationNames = null;
      if (allowDelegation && delegationCount > 0) {
        const inputs = document.querySelectorAll(".delegationNameInput");
        const names = Array.from(inputs).map(i => i.value.trim());
        if (names.some(n => !n)) { vMsg.textContent = "Bitte alle Namen der übertragenden Personen eintragen."; return; }
        delegationNames = names;
      }

      submitBtn.disabled = true; submitBtn.textContent = "Wird gespeichert...";

      const vToken = getVoterToken(currentSession.token);
      const weight = 1 + delegationCount;

      const { error } = await sb.from("votes").insert({
        session_id: currentSession.id,
        option_index: selected,
        voter_code: voterCode,     
        voter_token: vToken, 
        weight: weight,
        delegation_names: delegationNames
      });

      if(error) {
        if(error.code === "23505") {
          sessionStorage.setItem("voted_" + currentSession.token, "1");
          showBlockedState();
        } else {
          vMsg.textContent = "Fehler bei der Abgabe: " + error.message;
          submitBtn.disabled = false; updateSubmitLabel();
        }
        return;
      }

      sessionStorage.setItem("voted_" + currentSession.token, "1");
      wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
        '<div style="font-size:40px; margin-bottom:10px;">✅</div>' +
        '<h2 style="font-size:24px; font-weight:800;">Stimme erfasst</h2>' +
        '<p style="color:var(--muted); font-size:14px;">Danke für deine Teilnahme.</p>' +
        '</div>';
    });
  }

  // --- HAUPT-LOGIK MIT FEHLER-CATCHER ---
  (async () => {
    try {
        const token = getToken();
        if (!token) {
            wrap.innerHTML = '<div class="glass" style="text-align:center;">Ungültiger Link.<br><span style="font-size:12px; color:var(--muted);">Es wurde kein Token in der URL gefunden.</span></div>';
            return;
        }

        if (sessionStorage.getItem("voted_" + token)) { 
            showBlockedState();
            return; 
        }

        const { data, error } = await sb.from("vote_sessions").select("*").eq("token", token).maybeSingle();
        
        if (error) throw new Error(error.message);
        if (!data) {
            wrap.innerHTML = '<div class="glass" style="text-align:center;">Abstimmung nicht gefunden.<br><span style="font-size:12px; color:var(--muted);">Der Link ist veraltet oder ungültig.</span></div>';
            return;
        }
        
        currentSession = data;

        // Bestimme die aktiven Gruppen rückwärtskompatibel (group_ids Array oder altes group_id Feld)
        let activeGroups = [];
        if (data.group_ids && data.group_ids.length > 0) {
            activeGroups = data.group_ids;
        } else if (data.group_id) {
            activeGroups = [data.group_id];
        }
        currentSession.activeGroups = activeGroups;

        if (data.status !== "open") {
            playTheatricalAnimation('closed');
        } else {
            if(activeGroups.length > 0) {
                showCodeEntry();
            } else {
                const vToken = getVoterToken(data.token);
                const { data: existingVote, error: vErr } = await sb.from("votes")
                    .select("id").eq("session_id", data.id).eq("voter_token", vToken).maybeSingle();
                
                if (existingVote) {
                    sessionStorage.setItem("voted_" + token, "1");
                    showBlockedState();
                    return;
                }
                voterCode = null;
                playTheatricalAnimation('open', showVotingOptions);
            }
        }
    } catch(err) {
        wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
            '<div style="font-size:30px; margin-bottom:10px;">⚠️</div>' +
            '<h3 style="margin-bottom:10px;">Fehler beim Laden</h3>' +
            '<p style="color:var(--red-light); font-size:13px;">' + err.message + '</p>' +
            '</div>';
    }
  })();
</script>
</body>
</html>
