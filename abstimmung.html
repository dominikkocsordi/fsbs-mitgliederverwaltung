<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Abstimmung · FSBS</title>
  <meta name="theme-color" content="#120e18">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#120e18; --bg2:#1a1424; --bg3:#1f162c;
      --accent1:#f97316; --accent2:#a855f7;
      --border: rgba(255,255,255,.18);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --shadow: 0 20px 55px rgba(0,0,0,.50);
      --ok: rgba(34,197,94,.95);
    }
    *{ box-sizing:border-box; }
    html,body{ min-height:100%; margin:0; }
    html{
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(249,115,22,.25), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(168,85,247,.22), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-attachment: fixed;
    }
    @supports (-webkit-touch-callout:none){ html{ background-attachment:scroll; } }
    body{
      font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color: var(--text);
      display:flex; justify-content:center; align-items:flex-start;
      padding: 40px 16px 60px;
      animation: pageIn .35s ease both;
    }
    @keyframes pageIn{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .wrap{ width:100%; max-width:520px; }

    .brand{
      display:flex; align-items:center; gap:12px; margin-bottom:24px;
    }
    .brandLogo{
      width:44px; height:44px; border-radius:12px; padding:5px;
      display:grid; place-items:center;
      background:rgba(255,255,255,.10); border:1px solid var(--border);
      backdrop-filter:blur(18px); flex:0 0 auto;
    }
    .brandLogo img{ width:100%; height:100%; border-radius:8px; object-fit:cover; display:block; }
    .brandTitle{ font-size:15px; font-weight:700; color:var(--muted); }

    .glass{
      background:rgba(255,255,255,.10); border:1px solid var(--border);
      border-radius:22px; box-shadow:var(--shadow);
      backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      padding:24px;
    }

    .sessionTitle{
      font-size:22px; font-weight:800; letter-spacing:.2px;
      margin:0 0 6px;
    }
    .sessionSub{
      font-size:13px; color:var(--muted); margin-bottom:24px;
    }

    .options{ display:flex; flex-direction:column; gap:10px; }

    .optBtn{
      width:100%; padding:16px 18px;
      background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.16);
      border-radius:16px; color:var(--text);
      font-size:15px; font-weight:600; text-align:left;
      cursor:pointer;
      transition: background .15s, border-color .15s, transform .12s;
      display:flex; align-items:center; gap:12px;
    }
    .optBtn:hover{ background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.28); transform:translateY(-1px); }
    .optBtn.selected{
      background:linear-gradient(135deg,rgba(249,115,22,.22),rgba(168,85,247,.18));
      border-color:rgba(249,115,22,.55);
      box-shadow:0 8px 24px rgba(249,115,22,.18);
    }
    .optBtn.selected .optCheck{ opacity:1; }
    .optCheck{
      width:20px; height:20px; border-radius:50%; flex:0 0 auto;
      border:2px solid rgba(249,115,22,.8);
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      display:grid; place-items:center; opacity:0;
      transition:opacity .15s;
      font-size:11px; color:#0f0b16; font-weight:900;
    }

    .submitRow{ margin-top:20px; }
    .btnPrimary{
      width:100%; padding:15px;
      background:linear-gradient(135deg,var(--accent1),var(--accent2));
      color:#0f0b16; font-weight:800; font-size:15px;
      border:none; border-radius:16px; cursor:pointer;
      box-shadow:0 12px 30px rgba(168,85,247,.25);
      transition:transform .15s,filter .15s,opacity .15s;
    }
    .btnPrimary:hover{ transform:translateY(-2px); filter:brightness(1.05); }
    .btnPrimary:disabled{ opacity:.45; cursor:not-allowed; transform:none; filter:none; }

    .stateBox{
      text-align:center; padding:40px 20px;
    }
    .stateIcon{ font-size:52px; margin-bottom:16px; }
    .stateTitle{ font-size:20px; font-weight:800; margin-bottom:8px; }
    .stateSub{ font-size:14px; color:var(--muted); line-height:1.5; }

    .spinner{
      width:36px; height:36px; border-radius:50%;
      border:3px solid rgba(255,255,255,.15);
      border-top-color:var(--accent1);
      animation:spin .7s linear infinite; margin:0 auto 16px;
    }
    @keyframes spin{ to{transform:rotate(360deg)} }

    .delegationSection{
      margin-top:20px; padding:16px; border-radius:16px;
      background:rgba(168,85,247,.08); border:1px solid rgba(168,85,247,.22);
    }
    .delegationTitle{
      font-size:14px; font-weight:700; color:rgba(168,85,247,.9);
      margin-bottom:12px; display:flex; align-items:center; gap:7px;
    }
    .delegationCountRow{
      display:flex; align-items:center; gap:12px; margin-bottom:12px;
    }
    .delegationCountRow label{ font-size:13px; color:var(--muted); font-weight:600; }
    .countStepper{
      display:flex; align-items:center; gap:8px;
    }
    .stepBtn{
      width:32px; height:32px; border-radius:10px; padding:0;
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.20);
      color:var(--text); font-size:18px; font-weight:700; line-height:1;
      cursor:pointer; display:grid; place-items:center;
      transition:background .13s, transform .12s;
    }
    .stepBtn:hover{ background:rgba(255,255,255,.20); transform:scale(1.06); }
    .stepBtn:disabled{ opacity:.35; cursor:not-allowed; transform:none; }
    .countDisplay{
      min-width:28px; text-align:center; font-size:18px; font-weight:800;
    }
    .delegationNames{ display:flex; flex-direction:column; gap:8px; }
    .delegationNameInput{
      background:rgba(255,255,255,.10); border:1px solid rgba(168,85,247,.30);
      color:var(--text); padding:10px 12px; border-radius:12px; outline:none;
      font-size:14px; font-family:inherit; width:100%;
      transition:background .15s, border-color .15s;
    }
    .delegationNameInput:focus{ border-color:rgba(168,85,247,.65); background:rgba(255,255,255,.15); }
    .delegationNameInput::placeholder{ color:rgba(255,255,255,.30); }
  </style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="brandLogo">
      <img src="logo.png" alt="FSBS" onerror="this.style.display='none';this.parentElement.textContent='FS';" />
    </div>
    <div class="brandTitle">Fachschaft Business School e.V.</div>
  </div>

  <div class="glass" id="card">
    <div class="stateBox" id="stateLoading">
      <div class="spinner"></div>
      <div class="stateSub">Lade Abstimmung…</div>
    </div>
  </div>

</div>
<script>
  const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
  const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const card = document.getElementById("card");

  function esc(s){ const d=document.createElement("div"); d.textContent=String(s??""); return d.innerHTML; }

  function showState(icon, title, sub){
    card.innerHTML = `<div class="stateBox">
      <div class="stateIcon">${icon}</div>
      <div class="stateTitle">${esc(title)}</div>
      <div class="stateSub">${esc(sub)}</div>
    </div>`;
  }

  function getToken(){
    return new URLSearchParams(location.search).get("s") || "";
  }

  function getVoterToken(sessionToken){
    const key = "vt_" + sessionToken;
    let vt = sessionStorage.getItem(key);
    if (!vt){ vt = crypto.randomUUID(); sessionStorage.setItem(key, vt); }
    return vt;
  }

  function alreadyVoted(sessionToken){
    return !!sessionStorage.getItem("voted_" + sessionToken);
  }

  function markVoted(sessionToken){
    sessionStorage.setItem("voted_" + sessionToken, "1");
  }

  function renderVoting(session){
    const opts = session.options || [];
    const sessionToken = session.token;
    const allowDelegation = !!session.allow_delegation;
    let selected = null;
    let delegationCount = 0;

    const delegationHtml = allowDelegation ? `
      <div class="delegationSection" id="delegationSection">
        <div class="delegationTitle">🔄 Stimmübertragungen</div>
        <div class="delegationCountRow">
          <label>Anzahl übertragener Stimmen:</label>
          <div class="countStepper">
            <button class="stepBtn" id="stepMinus" type="button" disabled>−</button>
            <span class="countDisplay" id="countDisplay">0</span>
            <button class="stepBtn" id="stepPlus" type="button">+</button>
          </div>
        </div>
        <div class="delegationNames" id="delegationNames"></div>
      </div>` : "";

    card.innerHTML = `
      <h1 class="sessionTitle">${esc(session.title)}</h1>
      <div class="sessionSub">Wähle eine Option und bestätige.</div>
      <div class="options" id="opts">
        ${opts.map((o, i) => `
          <button class="optBtn" data-i="${i}" type="button">
            <span class="optCheck">✓</span>
            ${esc(o)}
          </button>
        `).join("")}
      </div>
      ${delegationHtml}
      <div class="submitRow">
        <button class="btnPrimary" id="submitBtn" disabled type="button">Option wählen</button>
      </div>
      <div id="vMsg" style="margin-top:12px;font-size:13px;color:rgba(255,255,255,.6);text-align:center;min-height:18px;"></div>
    `;

    const submitBtn = document.getElementById("submitBtn");
    const vMsg = document.getElementById("vMsg");

    function updateSubmitLabel(){
      if (selected === null) return;
      const total = 1 + delegationCount;
      submitBtn.textContent = total > 1
        ? `„${opts[selected]}" wählen (${total} Stimmen)`
        : `„${opts[selected]}" wählen`;
    }

    function updateDelegationNames(){
      if (!allowDelegation) return;
      const container = document.getElementById("delegationNames");
      const existing = container.querySelectorAll(".delegationNameInput");
      const currentCount = existing.length;
      if (delegationCount > currentCount){
        for (let i = currentCount; i < delegationCount; i++){
          const inp = document.createElement("input");
          inp.type = "text";
          inp.className = "delegationNameInput";
          inp.placeholder = `Name der ${i + 1}. übertragenden Person`;
          inp.maxLength = 80;
          container.appendChild(inp);
        }
      } else {
        for (let i = currentCount; i > delegationCount; i--){
          container.removeChild(container.lastChild);
        }
      }
      document.getElementById("stepMinus").disabled = delegationCount <= 0;
      document.getElementById("countDisplay").textContent = delegationCount;
      updateSubmitLabel();
    }

    if (allowDelegation){
      document.getElementById("stepPlus").addEventListener("click", () => {
        if (delegationCount >= 9) return;
        delegationCount++;
        updateDelegationNames();
      });
      document.getElementById("stepMinus").addEventListener("click", () => {
        if (delegationCount <= 0) return;
        delegationCount--;
        updateDelegationNames();
      });
    }

    card.querySelectorAll(".optBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        card.querySelectorAll(".optBtn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selected = parseInt(btn.dataset.i);
        submitBtn.disabled = false;
        updateSubmitLabel();
      });
    });

    submitBtn.addEventListener("click", async () => {
      if (selected === null) return;

      let delegationNames = null;
      if (allowDelegation && delegationCount > 0){
        const inputs = document.querySelectorAll(".delegationNameInput");
        const names = Array.from(inputs).map(i => i.value.trim());
        if (names.some(n => !n)){
          vMsg.textContent = "Bitte alle Namen der übertragenden Personen eintragen.";
          return;
        }
        delegationNames = names;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Speichere…";
      vMsg.textContent = "";

      const voterToken = getVoterToken(sessionToken);
      const weight = 1 + delegationCount;

      const { error } = await sb.from("votes").insert({
        session_id: session.id,
        option_index: selected,
        voter_token: voterToken,
        weight,
        delegation_names: delegationNames,
      });

      if (error){
        if (error.code === "23505"){
          markVoted(sessionToken);
          showState("🔒", "Bereits abgestimmt", "Du hast für diese Abstimmung bereits eine Stimme abgegeben.");
        } else {
          submitBtn.disabled = false;
          updateSubmitLabel();
          vMsg.textContent = "Fehler: " + error.message;
        }
        return;
      }

      markVoted(sessionToken);
      const msg = weight > 1
        ? `Danke für deine Teilnahme. Deine Stimme und ${delegationCount} übertragene Stimme${delegationCount !== 1 ? "n" : ""} wurden anonym gespeichert.`
        : "Danke für deine Teilnahme. Deine Stimme wurde anonym gespeichert.";
      showState("✅", "Stimme erfasst!", msg);
    });
  }

  (async () => {
    const token = getToken();
    if (!token){ showState("❌", "Kein Link", "Bitte den Link vom Vorstand verwenden."); return; }

    if (alreadyVoted(token)){
      showState("🔒", "Bereits abgestimmt", "Du hast für diese Abstimmung bereits eine Stimme abgegeben.");
      return;
    }

    const { data, error } = await sb
      .from("vote_sessions")
      .select("*")
      .eq("token", token)
      .maybeSingle();

    if (error || !data){
      showState("❌", "Abstimmung nicht gefunden", "Der Link ist ungültig oder die Abstimmung wurde gelöscht.");
      return;
    }

    if (data.status !== "open"){
      showState("🔒", "Abstimmung geschlossen", "Diese Abstimmung wurde bereits beendet.");
      return;
    }

    renderVoting(data);
  })();
</script>
</body>
</html>
