<script>
/* ========= Supabase config ========= */
const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const LOGIN_PAGE = "login.html";

/* ========= Tables ========= */
const PROFILES_TABLE = "profiles";
const MEMBERS_TABLE = "members";
const CAND_TABLE = "anwaerter";

const CAND_STATUS_COL = "bewerbung_status";

/* Einheitliche Ressorts */
const RESSORTS = ["Externe Events","Interne Events","Merchandise","Kommunikation","Sponsoring"];

/* MV – Apps Script */
const MV_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJtYsEQbqqrp0gyfPp5caDitVndT1SwiLTSi1ybtf63_27UUv07wnlESYrP5-Cf2SEtA/exec";

/* Canonical Farbmap */
const RESSORT_COLORS = {
  "Externe Events":  ["var(--rx-a1)", "var(--rx-a2)"],
  "Interne Events":  ["var(--rx-p1)", "var(--rx-p2)"],
  "Merchandise":     ["var(--rx-g1)", "var(--rx-g2)"],
  "Kommunikation":   ["var(--rx-b1)", "var(--rx-b2)"],
  "Sponsoring":      ["linear-gradient(135deg, var(--rx-a1), var(--rx-p2))", null],
  "Abgelehnt":       ["var(--rx-r1)", "var(--rx-r2)"],
};

function pillStyle(label){
  const key = (label || "").trim();
  const pair = RESSORT_COLORS[key];

  if (pair && pair[1] === null && typeof pair[0] === "string" && pair[0].startsWith("linear-gradient")){
    return `background: ${pair[0]}; border-color: rgba(168,85,247,.28);`;
  }

  const a = pair?.[0] ?? "rgba(255,255,255,.10)";
  const b = pair?.[1] ?? "rgba(255,255,255,.06)";
  const border =
    key === "Externe Events" ? "rgba(249,115,22,.30)" :
    key === "Interne Events" ? "rgba(168,85,247,.30)" :
    key === "Merchandise"    ? "rgba(34,197,94,.26)"  :
    key === "Kommunikation"  ? "rgba(56,189,248,.28)" :
    key === "Sponsoring"     ? "rgba(168,85,247,.28)" :
    key === "Abgelehnt"      ? "rgba(239,68,68,.28)"  :
                               "rgba(255,255,255,.18)";

  return `background: linear-gradient(135deg, ${a}, ${b}); border-color: ${border};`;
}

function normRole(v){ return (v || "").trim().toLowerCase(); }

function roleLabel(role){
  const r = normRole(role);
  if (r === "vorstand") return "Vorstand";
  if (r === "ressortleiter") return "Ressortleiter";
  return "Unbekannt";
}

/* ========= Auth UI elements ========= */
const authBadge = document.getElementById("authBadge");
const authDot = document.getElementById("authDot");
const authState = document.getElementById("authState");
const authMail  = document.getElementById("authMail");
const authAvatar = document.getElementById("authAvatar");
const authCompact = document.getElementById("authCompact");
const authNameInline = document.getElementById("authNameInline");
const authRolePill = document.getElementById("authRolePill");
const authToggle = document.getElementById("authToggle");
const authDetails = document.getElementById("authDetails");

/* NAV: Finanzen nur Vorstand */
const navFinanzen  = document.getElementById("navFinanzen");
const navWahlen    = document.getElementById("navWahlen");
const navProtokoll = document.getElementById("navProtokoll");
const navZeugnisse = document.getElementById("navZeugnisse");

function setNavVisibility(isVorstand){
  if (!navFinanzen) return;
  navFinanzen.classList.toggle("hidden", !isVorstand);
  if (navWahlen)    navWahlen.style.display    = isVorstand ? "" : "none";
  if (navProtokoll) navProtokoll.style.display = isVorstand ? "" : "none";
  if (navZeugnisse) navZeugnisse.style.display = isVorstand ? "" : "none";
}

function closeAuthDetails(){
  authDetails.classList.add("hidden");
}

authToggle?.addEventListener("click", (e)=>{
  e.stopPropagation();
  authDetails.classList.toggle("hidden");
});

document.addEventListener("click", (e)=>{
  if (!authBadge.contains(e.target)) closeAuthDetails();
});

function hashString(str){
  let h = 2166136261;
  for (let i = 0; i < str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return (h >>> 0);
}

function initialsFromEmail(email){
  const e = (email || "").trim().toLowerCase();
  if (!e) return "U";
  const local = e.split("@")[0] || "u";
  const parts = local.split(/[.\-_]+/).filter(Boolean);
  const a = (parts[0]?.[0] || local[0] || "u").toUpperCase();
  const b = (parts[1]?.[0] || local[1] || "").toUpperCase();
  return (a + b).trim() || a;
}

function initialsFromText(txt){
  const t = (txt || "").trim();
  if (!t) return "U";
  const parts = t.split(/\s+/).filter(Boolean);
  const a = (parts[0]?.[0] || "U").toUpperCase();
  const b = (parts[1]?.[0] || "").toUpperCase();
  return (a + b).trim() || a;
}

function setAvatar(email){
  const e = (email || "").trim().toLowerCase();
  if (!e){
    authAvatar.classList.add("hidden");
    authAvatar.textContent = "U";
    authAvatar.style.background = "rgba(255,255,255,.10)";
    return;
  }
  const h = hashString(e);
  const hue = h % 360;
  const hue2 = (hue + 38) % 360;
  authAvatar.textContent = initialsFromEmail(e);
  authAvatar.classList.remove("hidden");
  authAvatar.style.background = `linear-gradient(135deg, hsla(${hue}, 85%, 55%, .55), hsla(${hue2}, 85%, 55%, .35))`;
}

function setRolePill(role){
  const r = normRole(role);
  authRolePill.textContent = roleLabel(r);
  authRolePill.classList.remove("vorstand","ressortleiter");
  if (r === "vorstand") authRolePill.classList.add("vorstand");
  else authRolePill.classList.add("ressortleiter");
}

function setCompactIdentity(displayName, email){
  const name = (displayName || "").trim();
  const fallback = ((email || "").split("@")[0] || "User").trim();
  authNameInline.textContent = name || fallback;
}

function setAuthUI(isAuthed, email = ""){
  if (isAuthed){
    authDot.classList.remove("warn");
    authDot.classList.add("ok");
    authState.classList.add("hidden");
    authCompact.classList.remove("hidden");
    closeAuthDetails();
    authMail.textContent = (email || "").trim();
    setAvatar(email);
  } else {
    authDot.classList.remove("ok");
    authDot.classList.add("warn");
    authState.classList.remove("hidden");
    authState.textContent = "nicht eingeloggt";
    authCompact.classList.add("hidden");
    closeAuthDetails();
    authMail.textContent = "";
    setAvatar("");
  }
}

async function requireAuthOrRedirect(){
  const { data } = await sb.auth.getSession();
  if (!data.session){
    window.location.replace(LOGIN_PAGE);
    throw new Error("No session");
  }
  return data.session;
}

async function loadMyProfile(session){
  const uid = session?.user?.id;
  const email = session?.user?.email || "";

  const { data, error } = await sb
    .from(PROFILES_TABLE)
    .select("role, display_name, ressort")
    .eq("id", uid)
    .single();

  if (error || !data){
    throw new Error("kein_profil");
  }

  const myRole = normRole(data?.role);
  setCompactIdentity(data?.display_name, email);
  setRolePill(myRole || "ressortleiter");

  const dn = (data?.display_name || "").trim();
  if (dn) authAvatar.textContent = initialsFromText(dn);

  authBadge.title = `${(dn || email || "User")} • ${roleLabel(myRole || "ressortleiter")}`;
  return {
    role: myRole || "ressortleiter",
    display_name: dn,
    ressort: (data?.ressort || "").trim(),
    email
  };
}

/* ========= Counting helpers ========= */
function candBaseFilter(q){
  return q.eq(CAND_STATUS_COL, "anwaerter");
}

async function countTable(table, filterCol=null, filterVal=null, opts = {}){
  let q = sb.from(table).select("id", { count:"exact", head:true });
  if (typeof opts.base === "function") q = opts.base(q);
  if (filterCol && filterVal) q = q.eq(filterCol, filterVal);
  const res = await q;
  return res.count ?? 0;
}

/* ========= Dashboard UI ========= */
const grid = document.getElementById("grid");

function go(href, ev){
  ev?.stopPropagation();
  location.href = href;
}

function card({span="kpi", title, value, sub, icon, href, buttonText="Öffnen"}){
  const btn = href ? `<button class="btn-secondary" type="button" onclick="go('${href}', event)">${buttonText} ↗</button>` : "";
  return `
    <div class="glass ${span} kpi kpiCard" ${href ? `onclick="location.href='${href}'"` : ""}>
      <div class="kpiTop">
        <div>
          <div class="kpiTitle">${title}</div>
          <div class="kpiValue">${value}</div>
          <div class="kpiSub">${sub || ""}</div>
        </div>
        <div class="kpiIcon">${icon || "✨"}</div>
      </div>
      <div class="kpiActions">${btn}</div>
    </div>
  `;
}

function cardStatic({span="kpiFull", title, sub, innerHtml=""}){
  return `
    <div class="glass ${span} card">
      <div style="font-weight:900; font-size:16px; letter-spacing:.2px;">${title}</div>
      ${sub ? `<div class="small" style="margin-top:6px;">${sub}</div>` : ""}
      <div class="hr"></div>
      ${innerHtml}
    </div>
  `;
}

function resortBadge(name, membersCount, candCount){
  const label = (name || "—").trim();
  return `
    <span class="badge" style="${pillStyle(label)}">
      ${label} · <strong>${membersCount}</strong> Mitgl · <strong>${candCount}</strong> Anw
    </span>
  `;
}

/* ========= MV CSV parsing ========= */
function parseCsvLine(line){
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++){
    const char = line[i];
    const next = line[i + 1];

    if (char === '"'){
      if (inQuotes && next === '"'){
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes){
      result.push(current.trim());
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current.trim());
  return result;
}

function parseMvCsv(text){
  const lines = text
    .split(/\r?\n/)
    .filter(line => line.trim() !== "");

  if (lines.length < 2) return [];

  const headers = parseCsvLine(lines[0]);

  return lines.slice(1).map(line => {
    const cols = parseCsvLine(line);
    const row = {};
    headers.forEach((h, i) => {
      row[h] = cols[i] || "";
    });
    return row;
  });
}

function getMvStatus(row){
  const candidates = [
    row["Status"],
    row["Nimmst du an der MV teil?"],
    row["Nimmst du an der Mitgliederversammlung teil?"],
    row["Teilnahme"],
    row["Anwesenheit"]
  ];

  return String(candidates.find(Boolean) || "").toLowerCase().trim();
}

function isPresent(row){
  const s = getMvStatus(row);
  return s.includes("ja") || s.includes("anwesend") || s.includes("zugesagt");
}

async function loadMvWidget(){
  const totalEl = document.getElementById("mvTotal");
  const splitEl = document.getElementById("mvSplit");
  const quoteEl = document.getElementById("mvQuote");

  if (!totalEl || !splitEl || !quoteEl) return;

  try{
    const [mvRes, { count: memberCount }] = await Promise.all([
      fetch(MV_APPS_SCRIPT_URL, { cache: "no-store" }),
      sb.from("members").select("*", { count: "exact", head: true }).in("status", ["Vollmitglied", "Fördermitglied"])
    ]);

    if (!mvRes.ok) throw new Error(`HTTP ${mvRes.status}`);
    const json = await mvRes.json();
    if (!json.ok) throw new Error(json.error || "Apps Script Fehler");

    const rows  = json.rows;
    const total = rows.length;
    const yes   = rows.filter(r => {
      const s = String(r.status || "").toLowerCase();
      return s.includes("ja") || s.includes("anwesend");
    }).length;
    const no    = Math.max(0, total - yes);

    totalEl.textContent = String(total);
    splitEl.textContent = `${yes} / ${no}`;

    if (memberCount && memberCount > 0) {
      quoteEl.textContent = `${Math.round((yes / memberCount) * 100)}%`;
    } else {
      quoteEl.textContent = `${yes} Zusagen`;
    }
  } catch(err){
    console.warn("MV-Widget konnte nicht geladen werden:", err.message);
    totalEl.textContent = "–";
    splitEl.textContent = "–";
    quoteEl.textContent = "–";
  }
}

async function loadDashboard(){
  const session = await requireAuthOrRedirect();
  const email = session?.user?.email || "";
  setAuthUI(true, email);

  const me = await loadMyProfile(session);
  const isVorstand = normRole(me.role) === "vorstand";
  const myRessort = (me.ressort || "").trim();

  setNavVisibility(isVorstand);

  const membersAll = await countTable(MEMBERS_TABLE);
  const candAll = await countTable(CAND_TABLE, null, null, { base: candBaseFilter });

  const membersMine = myRessort ? await countTable(MEMBERS_TABLE, "ressort", myRessort) : 0;
  const candMine = myRessort ? await countTable(CAND_TABLE, "ressort", myRessort, { base: candBaseFilter }) : 0;

  if (!isVorstand){
    grid.innerHTML = `
      ${cardStatic({
        span:"kpiBig",
        title:"Mein Ressort",
        sub:"Deine Übersicht (nur dein Ressort).",
        innerHtml: `
          <div style="margin-top:12px;">
            <span class="badge" style="${pillStyle(myRessort || "Kommunikation")}">
              ${myRessort ? myRessort : "—"} · <strong>${membersMine}</strong> Mitgl · <strong>${candMine}</strong> Anw
            </span>
          </div>
        `
      })}
      ${card({ href:"members.html", title:"Mitglieder", value:String(membersMine), sub:"Mitglieder in deinem Ressort.", icon:"👥", span:"kpiBig", buttonText:"Mitglieder" })}
      ${card({ href:"anwaerter.html", title:"Anwärter", value:String(candMine), sub:"Anwärter in deinem Ressort.", icon:"👶🏼", span:"kpiBig", buttonText:"Anwärter" })}
    `;
    return;
  }

  const byR = await Promise.all(
    RESSORTS.map(async r => ({
      r,
      m: await countTable(MEMBERS_TABLE, "ressort", r),
      a: await countTable(CAND_TABLE, "ressort", r, { base: candBaseFilter })
    }))
  );

  grid.innerHTML = `
    ${card({ href:"members.html", title:"Gesamt Mitglieder", value:String(membersAll), sub:"Alle Ressorts zusammen.", icon:"👥", span:"kpiBig", buttonText:"Mitglieder" })}
    ${card({ href:"anwaerter.html", title:"Gesamt Anwärter", value:String(candAll), sub:"Alle offenen Anwärter.", icon:"👶🏼", span:"kpiBig", buttonText:"Anwärter" })}
    ${cardStatic({
      title:"Ressort-Übersicht",
      sub:"Mitglieder & Anwärter pro Ressort.",
      innerHtml: `<div class="ressortList">${byR.map(x => resortBadge(x.r, x.m, x.a)).join("")}</div>`
    })}
  `;
}

async function logout(){
  await sb.auth.signOut();
  window.location.replace(LOGIN_PAGE);
}

/* ========= Init ========= */
const _pageLoader = document.getElementById("pageLoader");
(async () => {
  try{
    const session = await requireAuthOrRedirect();
    const email = session?.user?.email || "";
    setAuthUI(true, email);
    await loadDashboard();
    await loadMvWidget();
  } catch(e){
    if (e?.message === "kein_profil"){
      setAuthUI(true, "");
      const g = document.getElementById("grid");
      if (g) g.innerHTML = `<div style="grid-column:1/-1;padding:32px;text-align:center;color:rgba(255,255,255,.6);font-size:15px;">⛔ Kein Zugriff – deine E-Mail ist nicht freigeschaltet.</div>`;
    } else {
      setAuthUI(false);
    }
  } finally {
    if (_pageLoader) _pageLoader.classList.add("hidden");
  }
})();

if ("serviceWorker" in navigator){
  window.addEventListener("load", () => {
