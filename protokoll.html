<style>
  /* ============================================================
     Protokoll – local styles
     ============================================================ */

  /* Save indicator pill */
  .saveIndicator {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
    border: 1px solid transparent;
  }
  .saveIndicator.saved   { background: rgba(34,197,94,0.15);  border-color: rgba(34,197,94,0.30);  color: #86efac; }
  .saveIndicator.saving  { background: rgba(56,189,248,0.15); border-color: rgba(56,189,248,0.30); color: #7dd3fc; }
  .saveIndicator.unsaved { background: rgba(251,146,60,0.18); border-color: rgba(251,146,60,0.32); color: #fdba74; }

  /* Saved-protocols bar */
  .protokollBar {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 20px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .protokollBarHead {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .protokollBarTitle {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    flex: 1 1 auto;
  }
  .protokollList {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .protoListItem {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s;
    max-width: 220px;
  }
  .protoListItem:hover { background: rgba(255,255,255,0.12); border-color: rgba(249,115,22,0.30); }
  .protoListItem.active { background: rgba(249,115,22,0.16); border-color: rgba(249,115,22,0.40); color: #fed7aa; }
  .protoListItem > span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 auto; }
  .protoItemDel {
    background: none;
    border: none;
    padding: 2px 4px;
    border-radius: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    flex: 0 0 auto;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .protoItemDel:hover { color: #fca5a5; background: rgba(239,68,68,0.15); }
  .protoListEmpty { font-size: 13px; color: var(--muted); padding: 4px 2px; }

  /* Page section header */
  .pageHeader { margin-bottom: 14px; }
  .pageTitle { font-size: 18px; font-weight: 800; }
  .pageSub { font-size: 13px; color: var(--muted); margin-top: 3px; }

  /* Protocol header card */
  .protoHeaderCard {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .protoHeaderGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .fieldGroup { display: flex; flex-direction: column; gap: 5px; }
  .fieldGroup.full { grid-column: 1 / -1; }
  .fieldGroup > label {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.50);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .timeRow {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .timeRow span { color: var(--muted); font-size: 14px; flex: 0 0 auto; }
  .timeRow input { flex: 1 1 0; }

  /* Anwesende + member picker */
  .anwLabel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }
  .anwLabel label { margin-bottom: 0; }
  .btn-pick {
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    border-radius: 10px;
    background: rgba(168,85,247,0.14);
    border: 1px solid rgba(168,85,247,0.28);
    color: #e9d5ff;
    transition: background 0.15s, transform 0.15s;
  }
  .btn-pick:hover, .btn-pick.active { background: rgba(168,85,247,0.25); transform: translateY(-1px); }
  .memberPicker {
    margin-top: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    overflow: hidden;
  }
  .mpSearch {
    border-radius: 0;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.06);
    width: 100%;
  }
  .mpList {
    max-height: 180px;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .mpItem {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.13s;
    font-size: 13px;
  }
  .mpItem:hover { background: rgba(255,255,255,0.07); }
  .mpItem input[type=checkbox] { accent-color: var(--accent2); flex: 0 0 auto; width: 15px; height: 15px; }
  .mpItem label { cursor: pointer; flex: 1 1 auto; }
  .mpRessort { color: var(--muted); font-size: 11px; margin-left: 4px; }
  .mpEmpty { font-size: 13px; color: var(--muted); padding: 8px 4px; }
  .mpActions {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-wrap: wrap;
  }
  .mpCount { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* Buttons: sm / xs sizes */
  .btn-sm { padding: 8px 14px; font-size: 13px; font-weight: 700; border-radius: 12px; }
  .btn-xs { padding: 6px 12px; font-size: 12px; font-weight: 700; border-radius: 10px; }

  /* Quick-add blocks bar */
  .bausteineWrap {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .bausteineTitle {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.50);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 10px;
  }
  .bausteineBtns { display: flex; flex-wrap: wrap; gap: 7px; }
  .baustein-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 650;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.13);
    color: var(--text);
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }
  .baustein-btn:hover {
    background: rgba(249,115,22,0.16);
    border-color: rgba(249,115,22,0.32);
    color: #fed7aa;
    transform: translateY(-1px);
  }

  /* Block list */
  .blockList { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }

  /* Individual protocol block */
  .block {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    overflow: hidden;
    transition: border-color 0.16s;
  }
  .block:hover { border-color: rgba(255,255,255,0.18); }

  .blockHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .blockType {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.80);
    flex: 1 1 auto;
    min-width: 0;
  }
  .blockTypeIcon { font-size: 16px; flex: 0 0 auto; }
  .blockNum {
    display: inline-flex;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    background: rgba(249,115,22,0.16);
    border: 1px solid rgba(249,115,22,0.28);
    color: #fed7aa;
    white-space: nowrap;
  }
  .blockActions { display: flex; gap: 4px; flex: 0 0 auto; }
  .block-act {
    width: 30px;
    height: 30px;
    padding: 0;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 700;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    color: var(--text);
    display: grid;
    place-items: center;
    transition: background 0.13s, transform 0.13s;
  }
  .block-act:not(:disabled):hover { background: rgba(255,255,255,0.14); transform: translateY(-1px); }
  .block-act:disabled { opacity: 0.25; }
  .block-act.del:not(:disabled):hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.30); color: #fca5a5; }

  .blockFields {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .blockFields input, .blockFields select, .blockFields textarea {
    width: 100%;
  }
  .blockFields textarea { resize: vertical; min-height: 80px; }
  .blockFields textarea.tall { min-height: 110px; }

  /* Voting row */
  .abstRow {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1.4fr;
    gap: 10px;
    align-items: end;
  }
  .abstLabel { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  .ergebnisSelect { grid-column: auto; }

  /* Pause block */
  .pauseBlock { display: flex; align-items: center; gap: 10px; }
  .pauseBlock input { flex: 1 1 auto; }

  /* Empty state */
  .emptyBlocks {
    padding: 50px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 18px;
  }
  .emptyIcon { font-size: 36px; margin-bottom: 10px; }
  .emptyTitle { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.70); margin-bottom: 6px; }

  /* Export bar */
  .exportBar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 18px;
    padding: 16px 20px;
    margin-top: 4px;
  }
  .exportInfo { font-size: 14px; color: rgba(255,255,255,0.75); }
  .exportBtns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-export {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    background: linear-gradient(135deg, rgba(249,115,22,0.85), rgba(168,85,247,0.80));
    color: #0f0b16;
    border: none;
    cursor: pointer;
    transition: filter 0.16s, transform 0.16s;
  }
  .btn-export:hover { filter: brightness(1.06); transform: translateY(-2px); }

  @media (max-width: 640px) {
    .protoHeaderGrid { grid-template-columns: 1fr; }
    .abstRow { grid-template-columns: 1fr 1fr; }
    .exportBar { flex-direction: column; align-items: stretch; }
    .btn-export { justify-content: center; }
  }
</style>

<script>
const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const LOGIN_PAGE = "login.html";

/* ---- Helpers ---- */
function esc(s){ const d=document.createElement("div"); d.textContent=String(s??""); return d.innerHTML; }

let toastTimer;
function showToast(msg, isError=false){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.toggle("error",isError); t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2800);
}

function fmtDate(iso){
  if(!iso) return "";
  try{
    const d = new Date(iso+"T12:00:00");
    return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
  }catch{ return iso; }
}
function fmtDateTime(iso){
  if(!iso) return "";
  try{
    const d = new Date(iso);
    return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})
      + " " + d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
  }catch{ return iso; }
}

/* ---- Auth UI ---- */
const authBadge   = document.getElementById("authBadge");
const authDot     = document.getElementById("authDot");
const authState   = document.getElementById("authState");
const authMail    = document.getElementById("authMail");
const authAvatar  = document.getElementById("authAvatar");
const authCompact = document.getElementById("authCompact");
const authNameInline = document.getElementById("authNameInline");
const authRolePill   = document.getElementById("authRolePill");
const authToggle  = document.getElementById("authToggle");
const authDetails = document.getElementById("authDetails");

function closeAuthDetails(){ authDetails.classList.add("hidden"); }
authToggle?.addEventListener("click", e=>{ e.stopPropagation(); authDetails.classList.toggle("hidden"); });
document.addEventListener("click", e=>{ if(!authBadge.contains(e.target)) closeAuthDetails(); });

function hashString(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); }
  return h>>>0;
}
function initialsFromEmail(email){
  const e=(email||"").trim().toLowerCase(); if(!e) return "U";
  const local=e.split("@")[0]||"u";
  const parts=local.split(/[.\-_]+/).filter(Boolean);
  const a=(parts[0]?.[0]||local[0]||"u").toUpperCase();
  const b=(parts[1]?.[0]||local[1]||"").toUpperCase();
  return (a+b).trim()||a;
}
function setAvatar(email){
  const e=(email||"").trim().toLowerCase();
  if(!e){ authAvatar.classList.add("hidden"); return; }
  const h=hashString(e); const hue=h%360; const hue2=(hue+38)%360;
  authAvatar.textContent=initialsFromEmail(e);
  authAvatar.classList.remove("hidden");
  authAvatar.style.background=`linear-gradient(135deg,hsla(${hue},85%,55%,.55),hsla(${hue2},85%,55%,.35))`;
}
function normRole(v){ return (v||"").trim().toLowerCase(); }
function roleLabel(r){ if(r==="vorstand") return "Vorstand"; if(r==="ressortleiter") return "Ressortleiter"; return "Unbekannt"; }
function setRolePill(role){
  const r=normRole(role);
  authRolePill.textContent=roleLabel(r);
  authRolePill.classList.remove("vorstand","ressortleiter");
  if(r==="vorstand") authRolePill.classList.add("vorstand");
  else authRolePill.classList.add("ressortleiter");
}
function setAuthUI(isAuthed, email=""){
  if(isAuthed){
    authDot.classList.remove("warn"); authDot.classList.add("ok");
    authState.classList.add("hidden"); authCompact.classList.remove("hidden");
    closeAuthDetails(); authMail.textContent=(email||"").trim(); setAvatar(email);
  } else {
    authDot.classList.remove("ok"); authDot.classList.add("warn");
    authState.classList.remove("hidden"); authState.textContent="nicht eingeloggt";
    authCompact.classList.add("hidden"); closeAuthDetails(); authMail.textContent=""; setAvatar("");
  }
}
async function requireAuthOrRedirect(){
  const { data } = await sb.auth.getSession();
  if(!data.session){ window.location.replace(LOGIN_PAGE); throw new Error("No session"); }
  return data.session;
}
async function loadMyProfile(session){
  const uid=session?.user?.id; const email=session?.user?.email||"";
  const { data, error } = await sb.from("profiles").select("role,display_name").eq("id",uid).maybeSingle();
  if(error||!data) throw new Error("kein_profil");
  setAuthUI(true, email);
  const name=(data.display_name||"").trim();
  authNameInline.textContent = name||email.split("@")[0];
  setRolePill(data.role);
  const isVorstand = normRole(data.role)==="vorstand";
  const navFinanzen = document.getElementById("navFinanzen");
  const navWahlen   = document.getElementById("navWahlen");
  const navZeugnisse = document.getElementById("navZeugnisse");
  if(navFinanzen) navFinanzen.style.display = isVorstand ? "" : "none";
  if(navWahlen)   navWahlen.style.display   = isVorstand ? "" : "none";
  if(navZeugnisse) navZeugnisse.style.display = isVorstand ? "" : "none";
  return { ...data, email, displayName: name||email.split("@")[0] };
}
async function logout(){
  await sb.auth.signOut(); window.location.replace(LOGIN_PAGE);
}

/* ================================================================
   PROTOKOLL ENGINE
   ================================================================ */

let blocks        = [];
let nextId        = 1;
let currentUser   = "";
let currentUserId = null;
let currentProtokollId = null;   // UUID in Supabase, null = noch nicht gespeichert
let protokollList = [];          // alle gespeicherten Protokolle
let saveStatus    = "saved";     // "saved" | "saving" | "unsaved"
let saveTimer     = null;

const BLOCK_DEFS = {
  begruessung: { label:"Begrüßung & Eröffnung", icon:"👋" },
  top:         { label:"Tagesordnungspunkt",     icon:"📋" },
  abstimmung:  { label:"Abstimmung",             icon:"🗳️" },
  beschluss:   { label:"Beschluss",              icon:"✅" },
  diskussion:  { label:"Diskussionspunkt",       icon:"💬" },
  pause:       { label:"Pause",                  icon:"☕" },
  schluss:     { label:"Sitzungsende",           icon:"🔚" },
};

/* ---- Data defaults ---- */
function defaultData(type){
  switch(type){
    case "begruessung": return { inhalt:"" };
    case "top":         return { titel:"", inhalt:"" };
    case "abstimmung":  return { antrag:"", ja:"0", nein:"0", enthaltung:"0", ergebnis:"angenommen", anmerkung:"" };
    case "beschluss":   return { text:"" };
    case "diskussion":  return { thema:"", inhalt:"" };
    case "pause":       return { dauer:"" };
    case "schluss":     return { uhrzeit:"", anmerkung:"" };
    default:            return {};
  }
}

/* ---- Header R/W ---- */
function getHeaderData(){
  return {
    typ:              document.getElementById("hdrTyp")?.value  || "",
    titel:            document.getElementById("hdrTitel")?.value|| "",
    datum:            document.getElementById("hdrDatum")?.value|| "",
    von:              document.getElementById("hdrVon")?.value  || "",
    bis:              document.getElementById("hdrBis")?.value  || "",
    ort:              document.getElementById("hdrOrt")?.value  || "",
    protokollfuehrer: document.getElementById("hdrPfl")?.value  || "",
    anwesende:        document.getElementById("hdrAnw")?.value  || "",
  };
}
function setHeaderData(d){
  const set=(id,val)=>{ const el=document.getElementById(id); if(el) el.value=val||""; };
  set("hdrTyp",   d.typ);
  set("hdrTitel", d.titel);
  set("hdrDatum", d.datum);
  set("hdrVon",   d.von);
  set("hdrBis",   d.bis);
  set("hdrOrt",   d.ort);
  set("hdrPfl",   d.protokollfuehrer);
  set("hdrAnw",   d.anwesende);
  document.querySelectorAll(".protoHeaderCard textarea").forEach(ta=>{ autoResize(ta); });
}

/* ---- Auto-numbering ---- */
function getTopNumber(id){ let n=0; for(const b of blocks){ if(b.type==="top") n++; if(b.id===id) return n; } return 0; }
function getBeschlussNumber(id){ let n=0; for(const b of blocks){ if(b.type==="beschluss") n++; if(b.id===id) return n; } return 0; }

/* ---- Save status indicator ---- */
function setSaveStatus(s){
  saveStatus = s;
  const el = document.getElementById("saveIndicator");
  if(!el) return;
  el.className = "saveIndicator " + s;
  el.textContent = s==="saved" ? "✓ Gespeichert" : s==="saving" ? "↑ Speichern…" : "● Ungespeichert";
}

/* ---- Supabase persistence ---- */
function scheduleSave(){
  setSaveStatus("unsaved");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>saveToSupabase(), 1500);
}

async function saveToSupabase(){
  syncAllBlocks();
  setSaveStatus("saving");
  const header  = getHeaderData();
  const payload = {
    titel:   (header.titel||"").trim() || "Unbenanntes Protokoll",
    datum:   header.datum || null,
    typ:     header.typ   || "Vorstandssitzung",
    inhalt:  { header, blocks, nextId },
    user_id: currentUserId,
  };
  try {
    if(currentProtokollId){
      const { error } = await sb.from("protokolle").update(payload).eq("id", currentProtokollId);
      if(error) throw error;
    } else {
      const { data, error } = await sb.from("protokolle").insert(payload).select("id").single();
      if(error) throw error;
      currentProtokollId = data.id;
    }
    setSaveStatus("saved");
    await refreshProtokollList();
  } catch(e){
    setSaveStatus("unsaved");
    showToast("Speichern fehlgeschlagen: " + e.message, true);
  }
}

async function loadProtokoll(id){
  syncAllBlocks();
  const { data, error } = await sb.from("protokolle").select("*").eq("id",id).single();
  if(error){ showToast("Protokoll konnte nicht geladen werden.", true); return; }
  currentProtokollId = data.id;
  const inhalt = data.inhalt || {};
  blocks = inhalt.blocks || [];
  nextId = inhalt.nextId  || (blocks.length ? Math.max(...blocks.map(b=>b.id))+1 : 1);
  renderPage();
  if(inhalt.header) setHeaderData(inhalt.header);
  setSaveStatus("saved");
  renderProtokollListItems();
}

async function deleteProtokoll(id, e){
  e.stopPropagation();
  if(!confirm("Protokoll wirklich löschen?")) return;
  const { error } = await sb.from("protokolle").delete().eq("id", id);
  if(error){ showToast("Löschen fehlgeschlagen.", true); return; }
  if(currentProtokollId === id){
    currentProtokollId = null;
    blocks = []; nextId = 1;
    renderPage();
    setSaveStatus("saved");
  }
  await refreshProtokollList();
  showToast("Protokoll gelöscht.");
}

function newProtokoll(){
  if(saveStatus === "unsaved"){
    if(!confirm("Ungespeicherte Änderungen verwerfen und neues Protokoll starten?")) return;
  }
  clearTimeout(saveTimer);
  currentProtokollId = null;
  blocks = []; nextId = 1;
  memberPickerOpen = false;
  renderPage();
  setSaveStatus("saved");
  renderProtokollListItems();
}

async function refreshProtokollList(){
  const { data } = await sb.from("protokolle")
    .select("id,titel,datum,typ,updated_at")
    .order("updated_at",{ ascending:false });
  protokollList = data || [];
  renderProtokollListItems();
}

function renderProtokollListItems(){
  const container = document.getElementById("protokollListItems");
  if(!container) return;
  if(protokollList.length===0){
    container.innerHTML = `<span class="protoListEmpty">Noch keine gespeicherten Protokolle</span>`;
    return;
  }
  container.innerHTML = protokollList.map(p=>`
    <div class="protoListItem ${p.id===currentProtokollId?"active":""}" onclick="loadProtokoll('${p.id}')" title="Zuletzt gespeichert: ${esc(fmtDateTime(p.updated_at))}">
      <span>${esc(p.titel||"Unbenannt")}</span>
      ${p.datum ? `<span style="color:var(--muted);font-size:11px;">${esc(fmtDate(p.datum))}</span>` : ""}
      <button class="protoItemDel" onclick="deleteProtokoll('${p.id}',event)" title="Löschen" type="button">✕</button>
    </div>`).join("");
}

/* ---- Member picker ---- */
let memberPickerData  = null;   // cached after first load
let memberPickerOpen  = false;
let mpFilteredData    = [];
let pickerSelections  = new Set(); // tracks checked state across filter re-renders

function syncPickerSelectionsFromDOM(){
  document.querySelectorAll("#mpList input[type=checkbox]").forEach(cb=>{
    if(cb.checked) pickerSelections.add(cb.value);
    else           pickerSelections.delete(cb.value);
  });
}

async function toggleMemberPicker(){
  const panel  = document.getElementById("memberPickerPanel");
  const btn    = document.getElementById("btnPickMembers");
  if(!panel || !btn) return;

  memberPickerOpen = !memberPickerOpen;
  panel.style.display = memberPickerOpen ? "block" : "none";
  btn.classList.toggle("active", memberPickerOpen);

  if(memberPickerOpen){
    // Seed picker selections from textarea so already-applied names stay checked
    pickerSelections = getSelectedNames();

    if(!memberPickerData){
      const { data } = await sb.from("members")
        .select("vorname,nachname,ressort,status")
        .not("status","ilike","aus%")
        .order("nachname");
      memberPickerData = data || [];
    }
    document.getElementById("mpSearch").value = "";
    mpFilteredData = memberPickerData;
    renderMpList();
    document.getElementById("mpSearch")?.focus();
  }
}

function filterMemberPicker(q){
  if(!memberPickerData) return;
  // Preserve current checkbox state before re-rendering
  syncPickerSelectionsFromDOM();
  const t = q.trim().toLowerCase();
  mpFilteredData = t
    ? memberPickerData.filter(m=>
        (m.vorname+" "+m.nachname).toLowerCase().includes(t) ||
        (m.ressort||"").toLowerCase().includes(t))
    : memberPickerData;
  renderMpList();
}

function renderMpList(){
  const list    = document.getElementById("mpList");
  const countEl = document.getElementById("mpCount");
  if(!list) return;

  const current = pickerSelections;

  if(mpFilteredData.length === 0){
    list.innerHTML = `<div class="mpEmpty">Keine Mitglieder gefunden</div>`;
    if(countEl) countEl.textContent = "";
    return;
  }

  list.innerHTML = mpFilteredData.map((m,i)=>{
    const name  = [m.vorname, m.nachname].filter(Boolean).join(" ");
    const safId = "mp_" + i;
    const checked = current.has(name) ? "checked" : "";
    return `<div class="mpItem">
      <input type="checkbox" id="${safId}" value="${esc(name)}" ${checked}
             onchange="updateMpCount()">
      <label for="${safId}">
        ${esc(name)}
        ${m.ressort ? `<span class="mpRessort">· ${esc(m.ressort)}</span>` : ""}
      </label>
    </div>`;
  }).join("");

  updateMpCount();
}

function getSelectedNames(){
  const ta = document.getElementById("hdrAnw");
  if(!ta || !ta.value.trim()) return new Set();
  return new Set(
    ta.value.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean)
  );
}

function updateMpCount(){
  syncPickerSelectionsFromDOM();
  const el = document.getElementById("mpCount");
  if(!el) return;
  el.textContent = pickerSelections.size > 0 ? `${pickerSelections.size} ausgewählt` : "";
}

function applyMemberSelection(){
  // Sync any remaining visible checkboxes before applying
  syncPickerSelectionsFromDOM();
  const ta = document.getElementById("hdrAnw");
  if(!ta) return;

  // Keep manually typed names that are not in the picker at all
  const existing = ta.value.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
  const allPickerNames = new Set(memberPickerData.map(m=>[m.vorname,m.nachname].filter(Boolean).join(" ")));
  const manual = existing.filter(n => !allPickerNames.has(n));

  const merged = [...new Set([...pickerSelections, ...manual])].sort((a,b)=>a.localeCompare(b,"de"));
  ta.value = merged.join("\n");
  autoResize(ta);
  scheduleSave();

  memberPickerOpen = true;   // set to true so toggle closes it
  toggleMemberPicker();
  showToast(`${pickerSelections.size} Mitglieder übernommen.`);
}

/* ---- Block sync ---- */
function syncBlockData(id){
  const b=blocks.find(x=>x.id===id); if(!b) return;
  const el=document.querySelector(`[data-id="${id}"]`); if(!el) return;
  el.querySelectorAll("[data-field]").forEach(inp=>{ b.data[inp.dataset.field]=inp.value; });
}
function syncAllBlocks(){ for(const b of blocks) syncBlockData(b.id); }

/* ---- Block mutation ---- */
function addBlock(type){
  syncAllBlocks();                                   // ← BUG-FIX: Daten sichern vor Re-Render
  const id = nextId++;
  blocks.push({ id, type, data: defaultData(type) });
  renderBlocks();
  scheduleSave();
  setTimeout(()=>{
    document.querySelector(".blockList .block:last-child")
      ?.scrollIntoView({ behavior:"smooth", block:"nearest" });
  }, 60);
}

function deleteBlock(id){
  syncAllBlocks();
  blocks = blocks.filter(b=>b.id!==id);
  renderBlocks();
  scheduleSave();
}

function moveBlock(id, dir){
  syncAllBlocks();
  const idx=blocks.findIndex(b=>b.id===id); if(idx<0) return;
  const newIdx=idx+dir; if(newIdx<0||newIdx>=blocks.length) return;
  [blocks[idx],blocks[newIdx]]=[blocks[newIdx],blocks[idx]];
  renderBlocks();
  scheduleSave();
}

/* ---- Rendering ---- */
function autoResize(ta){
  ta.style.height="auto";
  ta.style.height=(ta.scrollHeight+2)+"px";
}

function renderBlocks(){
  const container=document.getElementById("blockList"); if(!container) return;
  if(blocks.length===0){
    container.innerHTML=`
      <div class="emptyBlocks">
        <div class="emptyIcon">📄</div>
        <div class="emptyTitle">Noch keine Bausteine</div>
        <div>Klicke oben auf einen Schnellbaustein, um loszulegen.</div>
      </div>`;
    return;
  }
  container.innerHTML = blocks.map((b,i)=>buildBlockHTML(b,i)).join("");
  container.querySelectorAll("textarea").forEach(ta=>{
    autoResize(ta);
    ta.addEventListener("input",()=>{ autoResize(ta); scheduleSave(); });
  });
  container.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("input",()=>scheduleSave());
    el.addEventListener("change",()=>scheduleSave());
  });
  // update count
  const el=document.getElementById("blockCount"); if(el){
    const n=blocks.length;
    el.textContent=n===0?"Keine Bausteine":n===1?"1 Baustein":`${n} Bausteine`;
  }
}

function buildBlockHTML(b,idx){
  const def=BLOCK_DEFS[b.type]||{label:b.type,icon:"📌"};
  const isFirst=idx===0; const isLast=idx===blocks.length-1;
  let numBadge="";
  if(b.type==="top")       numBadge=`<span class="blockNum">TOP ${getTopNumber(b.id)}</span>`;
  if(b.type==="beschluss") numBadge=`<span class="blockNum">Beschluss ${getBeschlussNumber(b.id)}</span>`;
  return `<div class="block" data-id="${b.id}">
    <div class="blockHeader">
      <div class="blockType">
        <span class="blockTypeIcon">${def.icon}</span>
        ${esc(def.label)} ${numBadge}
      </div>
      <div class="blockActions">
        <button class="block-act" title="Nach oben"  onclick="moveBlock(${b.id},-1)" ${isFirst?"disabled":""} type="button">↑</button>
        <button class="block-act" title="Nach unten" onclick="moveBlock(${b.id}, 1)" ${isLast ?"disabled":""} type="button">↓</button>
        <button class="block-act del" title="Entfernen" onclick="deleteBlock(${b.id})" type="button">✕</button>
      </div>
    </div>
    <div class="blockFields">${buildFieldsHTML(b)}</div>
  </div>`;
}

function buildFieldsHTML(b){
  const v=b.data;
  switch(b.type){
    case "begruessung":
      return `<textarea data-field="inhalt" placeholder="Begrüßungstext, Anwesenheitsquorum, Eröffnung…" class="tall">${esc(v.inhalt)}</textarea>`;
    case "top":
      return `<input type="text" data-field="titel" placeholder="Titel des Tagesordnungspunkts" value="${esc(v.titel)}">
              <textarea data-field="inhalt" placeholder="Diskussionsverlauf, Ergebnisse, Notizen…" class="tall">${esc(v.inhalt)}</textarea>`;
    case "abstimmung":
      return `<input type="text" data-field="antrag" placeholder="Antragstext / Beschreibung" value="${esc(v.antrag)}">
        <div class="abstRow">
          <div><div class="abstLabel">✅ Ja</div>
               <input type="number" data-field="ja" min="0" value="${esc(v.ja||"0")}"></div>
          <div><div class="abstLabel">❌ Nein</div>
               <input type="number" data-field="nein" min="0" value="${esc(v.nein||"0")}"></div>
          <div><div class="abstLabel">⬜ Enthaltung</div>
               <input type="number" data-field="enthaltung" min="0" value="${esc(v.enthaltung||"0")}"></div>
          <div class="ergebnisSelect"><div class="abstLabel">Ergebnis</div>
            <select data-field="ergebnis">
              <option value="angenommen" ${v.ergebnis==="angenommen"?"selected":""}>✅ Angenommen</option>
              <option value="abgelehnt"  ${v.ergebnis==="abgelehnt" ?"selected":""}>❌ Abgelehnt</option>
              <option value="vertagt"    ${v.ergebnis==="vertagt"   ?"selected":""}>⏳ Vertagt</option>
            </select></div>
        </div>
        <textarea data-field="anmerkung" placeholder="Anmerkungen (optional)…">${esc(v.anmerkung)}</textarea>`;
    case "beschluss":
      return `<textarea data-field="text" placeholder="Beschlusstext…" class="tall">${esc(v.text)}</textarea>`;
    case "diskussion":
      return `<input type="text" data-field="thema" placeholder="Thema der Diskussion" value="${esc(v.thema)}">
              <textarea data-field="inhalt" placeholder="Diskussionsverlauf, wichtige Punkte…" class="tall">${esc(v.inhalt)}</textarea>`;
    case "pause":
      return `<div class="pauseBlock"><span style="font-size:20px;flex:0 0 auto;">☕</span>
              <input type="text" data-field="dauer" placeholder="Dauer (z.B. 15 Min.)" value="${esc(v.dauer)}"></div>`;
    case "schluss":
      return `<input type="text" data-field="uhrzeit" placeholder="Uhrzeit (z.B. 20:45)" value="${esc(v.uhrzeit)}">
              <textarea data-field="anmerkung" placeholder="Abschlussbemerkungen, nächster Termin…">${esc(v.anmerkung)}</textarea>`;
    default:
      return `<textarea data-field="inhalt" placeholder="Inhalt…">${esc(v.inhalt||"")}</textarea>`;
  }
}

/* ---- Word Export ---- */
function exportToWord(){
  syncAllBlocks();
  const header=getHeaderData();
  const datumFmt = header.datum
    ? new Date(header.datum+"T12:00:00").toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"})
    : "";
  let body="";
  body+=`<h1>${esc(header.typ||"Protokoll")}</h1>`;
  if(header.titel) body+=`<h2 style="text-align:center;border:none;font-size:15pt;">${esc(header.titel)}</h2>`;
  body+=`<table class="meta">
    <tr><td><b>Datum:</b></td><td>${esc(datumFmt)}</td>
        <td><b>Uhrzeit:</b></td><td>${esc(header.von||"–")} – ${esc(header.bis||"–")} Uhr</td></tr>
    <tr><td><b>Ort:</b></td><td>${esc(header.ort||"–")}</td>
        <td><b>Protokoll:</b></td><td>${esc(header.protokollfuehrer||"–")}</td></tr>
  </table>`;
  if(header.anwesende.trim()){
    const lines=header.anwesende.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
    body+=`<h2>Anwesende</h2><p>${lines.map(esc).join(" &nbsp;·&nbsp; ")}</p>`;
  }
  const topBlocks=blocks.filter(b=>b.type==="top");
  if(topBlocks.length>0){
    body+=`<h2>Tagesordnung</h2><ol>`;
    topBlocks.forEach(b=>{ body+=`<li>${esc(b.data.titel||"(ohne Titel)")}</li>`; });
    body+=`</ol>`;
  }
  body+=`<h2>Protokoll</h2>`;
  let topNum=0, beschlussNum=0;
  for(const b of blocks){
    switch(b.type){
      case "begruessung":
        body+=`<h3>Begrüßung und Eröffnung</h3>`;
        if(b.data.inhalt) body+=`<p>${esc(b.data.inhalt).replace(/\n/g,"<br>")}</p>`;
        break;
      case "top":
        topNum++;
        body+=`<h3>TOP ${topNum}: ${esc(b.data.titel||"(ohne Titel)")}</h3>`;
        if(b.data.inhalt) body+=`<p>${esc(b.data.inhalt).replace(/\n/g,"<br>")}</p>`;
        break;
      case "abstimmung":
        body+=`<h4>Abstimmung: ${esc(b.data.antrag||"")}</h4>
          <table class="abst"><tr><th>Ja</th><th>Nein</th><th>Enthaltung</th><th>Ergebnis</th></tr>
          <tr><td>${esc(b.data.ja||"0")}</td><td>${esc(b.data.nein||"0")}</td>
              <td>${esc(b.data.enthaltung||"0")}</td>
              <td class="${esc(b.data.ergebnis||"")}">${
                b.data.ergebnis==="angenommen"?"✅ Angenommen":
                b.data.ergebnis==="abgelehnt" ?"❌ Abgelehnt":"⏳ Vertagt"
              }</td></tr></table>`;
        if(b.data.anmerkung) body+=`<p><i>${esc(b.data.anmerkung).replace(/\n/g,"<br>")}</i></p>`;
        break;
      case "beschluss":
        beschlussNum++;
        body+=`<div class="beschluss"><b>Beschluss ${beschlussNum}:</b><br>${esc(b.data.text||"").replace(/\n/g,"<br>")}</div>`;
        break;
      case "diskussion":
        body+=`<h3>Diskussion: ${esc(b.data.thema||"")}</h3>`;
        if(b.data.inhalt) body+=`<p>${esc(b.data.inhalt).replace(/\n/g,"<br>")}</p>`;
        break;
      case "pause":
        body+=`<p style="text-align:center;color:#666;"><i>— Pause${b.data.dauer?" ("+esc(b.data.dauer)+")":""} —</i></p>`;
        break;
      case "schluss":
        body+=`<h3>Sitzungsende</h3>`;
        if(b.data.uhrzeit) body+=`<p>Die Sitzung wurde um <b>${esc(b.data.uhrzeit)} Uhr</b> geschlossen.</p>`;
        if(b.data.anmerkung) body+=`<p>${esc(b.data.anmerkung).replace(/\n/g,"<br>")}</p>`;
        break;
    }
  }
  const pfl=esc(header.protokollfuehrer||"Protokollführer/in");
  body+=`<br><br><br><table width="100%"><tr>
    <td width="42%" style="border-top:1px solid #555;text-align:center;padding-top:6pt;font-size:10pt;">${pfl}</td>
    <td width="16%"></td>
    <td width="42%" style="border-top:1px solid #555;text-align:center;padding-top:6pt;font-size:10pt;">1. Vorsitzende/r</td>
  </tr></table>`;

  const fullDoc=`<html xmlns:o='urn:schemas-microsoft-com:office:office'
    xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset='utf-8'><title>Protokoll</title>
  <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
  <style>
    @page{margin:2.5cm 2.5cm 2cm 2.5cm;}
    body{font-family:Arial,sans-serif;font-size:11pt;color:#111;line-height:1.55;}
    h1{font-size:17pt;font-weight:bold;text-align:center;margin:0 0 6pt;}
    h2{font-size:13pt;font-weight:bold;margin:18pt 0 6pt;border-bottom:1px solid #444;padding-bottom:3pt;}
    h3{font-size:11.5pt;font-weight:bold;margin:14pt 0 5pt;}
    h4{font-size:11pt;font-weight:bold;margin:10pt 0 4pt;}
    p{margin:4pt 0;}
    ol,ul{margin:4pt 0;padding-left:18pt;} li{margin:3pt 0;}
    table.meta{width:100%;border-collapse:collapse;margin:10pt 0 16pt;}
    table.meta td{padding:3pt 12pt 3pt 0;font-size:10.5pt;vertical-align:top;}
    table.abst{width:100%;border-collapse:collapse;margin:6pt 0 8pt;}
    table.abst th{background:#f0f0f0;border:1px solid #bbb;padding:4pt 8pt;font-size:10pt;text-align:center;}
    table.abst td{border:1px solid #bbb;padding:4pt 8pt;font-size:10pt;text-align:center;}
    .beschluss{background:#f7f7f7;border-left:3px solid #555;padding:6pt 10pt;margin:8pt 0;}
    .angenommen{color:#14532d;font-weight:bold;}
    .abgelehnt{color:#7f1d1d;font-weight:bold;}
    .vertagt{color:#78350f;font-weight:bold;}
  </style></head><body>${body}
</body></html>`;

  const blob=new Blob(["﻿",fullDoc],{type:"application/msword"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const safeName=(header.titel||"Protokoll").replace(/[^\w\säöüÄÖÜ\-]/g,"").trim().replace(/\s+/g,"_")||"Protokoll";
  const dateStr=(header.datum||new Date().toISOString().slice(0,10)).replace(/-/g,"");
  a.href=url; a.download=`Protokoll_${safeName}_${dateStr}.doc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("✅ Protokoll exportiert!");
}

/* ---- Init ---- */
(async()=>{
  try{
    const session = await requireAuthOrRedirect();
    const profile = await loadMyProfile(session);

    if(normRole(profile.role) !== "vorstand"){
      document.getElementById("pageLoader").classList.add("hidden");
      document.getElementById("mainContent").style.display = "";
      document.getElementById("mainContent").innerHTML=
        `<div class="glass card" style="text-align:center;padding:48px 24px;">
          <div style="font-size:32px;margin-bottom:12px;">⛔</div>
          <div style="font-weight:800;font-size:16px;">Kein Zugriff</div>
          <div style="margin-top:6px;color:var(--muted);">Diese Seite ist nur für den Vorstand.</div>
        </div>`;
      return;
    }

    currentUser   = profile.displayName || "";
    currentUserId = session.user.id;

    // Check URL for specific protocol ID
    const urlId = new URLSearchParams(location.search).get("id");

    renderPage();
    document.getElementById("pageLoader").classList.add("hidden");
    document.getElementById("mainContent").style.display = "";
    await refreshProtokollList();

    if(urlId){
      await loadProtokoll(urlId);
    } else if(protokollList.length > 0){
      // auto-load latest
      await loadProtokoll(protokollList[0].id);
    } else {
      setSaveStatus("saved");
    }

  } catch(e){
    if(e?.message==="kein_profil"){
      setAuthUI(false);
      document.getElementById("pageLoader").classList.add("hidden");
      document.getElementById("mainContent").style.display = "";
      document.getElementById("mainContent").innerHTML=
        `<div class="glass card" style="text-align:center;padding:48px 24px;">
          <div style="font-size:32px;margin-bottom:12px;">⛔</div>
          <div style="font-weight:800;font-size:16px;">Kein Zugriff</div>
          <div style="margin-top:6px;color:var(--muted);">Deine E-Mail ist nicht freigeschaltet.</div>
        </div>`;
    }
  }
})();
