<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Abstimmungen · FSBS</title>
<meta name="theme-color" content="#061827">
<link rel="stylesheet" href="/mobile-nav.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <h1>Abstimmungen</h1>
      <div class="subtitle">Wahlen & Berechtigungen verwalten</div>
    </div>
  </div>

  <div id="mainContent">
    <div class="pageHeader">
      <div style="display:flex; gap: 10px;">
        <button class="btn-primary" onclick="openCreateModal()">+ Neue Abstimmung</button>
        <button class="btn-secondary" onclick="openGroupModal()">👥 Gruppen & Codes</button>
      </div>
    </div>
    <div class="sessionList" id="sessionList">Lade...</div>
  </div>
</div>

<!-- Modal: Neue Abstimmung -->
<dialog id="createModal">
  <div class="modalBox">
    <div class="modalTitle">Neue Abstimmung</div>
    <div class="formGroup">
      <label class="formLabel">Titel</label>
      <input type="text" id="sessionTitle" placeholder="z.B. Wahl des Kassenwarts">
    </div>
    
    <!-- Hier ist das aktualisierte Mehrfachauswahl-Feld für Gruppen -->
    <div class="formGroup">
      <label class="formLabel">Freigeschaltete Wählergruppen (Mehrfachauswahl)</label>
      <div id="groupsCheckboxContainer" style="display:flex; flex-direction:column; gap:8px; background:rgba(255,255,255,.05); padding:12px; border-radius:14px; border:1px solid var(--border); max-height:160px; overflow-y:auto;">
        <!-- Dynamische Checkboxen -->
      </div>
      <div style="font-size:12px; color:var(--muted); margin-top:6px;">Wenn keine Gruppe angehakt wird, bleibt die Wahl für jeden offen zugänglich.</div>
    </div>

    <div class="formGroup">
      <label class="formLabel">Optionen</label>
      <div class="optionsList" id="optionsList"></div>
      <button class="btn-secondary btn-sm" onclick="addOptionRow()" style="margin-top:8px;">+ Option</button>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <button class="btn-secondary" onclick="document.getElementById('createModal').close()">Abbrechen</button>
      <button class="btn-primary" id="saveSessionBtn">Abstimmung starten</button>
    </div>
  </div>
</dialog>

<!-- Modal: Gruppenverwaltung -->
<dialog id="groupModal">
  <div class="modalBox" style="max-width: 600px;">
    <div class="modalTitle">Gruppen & Codes</div>
    <div class="formGroup" style="display:flex; gap:10px;">
      <input type="text" id="newGroupName" placeholder="Neue Gruppe (z.B. VV 2026)">
      <input type="number" id="newGroupCount" placeholder="Anzahl Codes" style="width: 120px;" min="1" max="200">
      <button class="btn-primary" onclick="createGroupAndCodes()">Erstellen</button>
    </div>
    <div class="formGroup">
      <label class="formLabel">Bestehende Gruppen</label>
      <select id="viewGroupSelect" onchange="loadCodesForGroup()"></select>
    </div>
    <div id="codesContainer" class="code-grid"></div>
    <div style="display:flex; justify-content:flex-end; margin-top:20px;">
      <button class="btn-secondary" onclick="document.getElementById('groupModal').close()">Schließen</button>
    </div>
  </div>
</dialog>

<script>
const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allSessions = [];
let allGroups = [];
let optionCount = 0;

function esc(s){ const d=document.createElement("div"); d.textContent=String(s??""); return d.innerHTML; }

async function init() { await loadGroups(); await loadSessions(); }

async function loadGroups() {
  const { data } = await sb.from("voter_groups").select("*").order("created_at", { ascending: false });
  allGroups = data || [];
  
  // Rendert die Checkboxen
  const container = document.getElementById("groupsCheckboxContainer");
  container.innerHTML = allGroups.map(g => `
    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
      <input type="checkbox" name="voterGroupCheckbox" value="\${g.id}" style="accent-color:var(--accent1); width:16px; height:16px;">
      <span>\${esc(g.name)}</span>
    </label>
  `).join('');

  const selView = document.getElementById("viewGroupSelect");
  selView.innerHTML = `<option value="" disabled selected>Gruppe wählen</option>` + allGroups.map(g => `<option value="\${g.id}">\${esc(g.name)}</option>`).join('');
}

async function loadSessions() {
  const { data } = await sb.from("vote_sessions").select("*").order("created_at", { ascending: false });
  allSessions = data || [];
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById("sessionList");
  if (allSessions.length === 0) return list.innerHTML = `<div class="glass" style="text-align:center;">Keine Abstimmungen vorhanden.</div>`;
  
  list.innerHTML = allSessions.map(s => `
    <div class="sessionCard">
      <div class="sessionCardTop">
        <div>
          <div class="sessionCardTitle">\${esc(s.title)}</div>
          <div style="display:flex; gap:10px; align-items:center; margin-top:8px;">
            <span class="statusBadge \${s.status === 'open' ? 'open' : 'closed'}">\${s.status === 'open' ? '● Offen' : '● Geschlossen'}</span>
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          \${s.status === 'open' ? `<button class="btn-secondary btn-sm" onclick="closeSession('\${s.id}')">🔒 Schließen</button>` : ''}
          <button class="btn-danger btn-sm" onclick="deleteSession('\${s.id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openCreateModal() {
  document.getElementById("sessionTitle").value = "";
  document.getElementById("optionsList").innerHTML = "";
  document.querySelectorAll('input[name="voterGroupCheckbox"]').forEach(cb => cb.checked = false);
  optionCount = 0;
  addOptionRow(); addOptionRow();
  document.getElementById("createModal").showModal();
}

function addOptionRow() {
  const div = document.createElement("div"); div.className = "optionRow";
  div.innerHTML = `<input type="text" placeholder="Option"><button class="optionRemove" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById("optionsList").appendChild(div);
}

document.getElementById("saveSessionBtn").addEventListener("click", async () => {
  const title = document.getElementById("sessionTitle").value.trim();
  const opts = Array.from(document.querySelectorAll(".optionRow input")).map(i => i.value.trim()).filter(Boolean);
  const checkedBoxes = document.querySelectorAll('input[name="voterGroupCheckbox"]:checked');
  const groupIds = Array.from(checkedBoxes).map(cb => cb.value);
  
  if (!title || opts.length < 2) return alert("Bitte Titel und mindestens 2 Optionen eingeben.");
  
  document.getElementById("saveSessionBtn").textContent = "Erstelle...";
  await sb.from("vote_sessions").insert({ title, options: opts, group_ids: groupIds });
  
  document.getElementById("createModal").close();
  document.getElementById("saveSessionBtn").textContent = "Abstimmung starten";
  await loadSessions();
});

async function closeSession(id) { await sb.from("vote_sessions").update({ status: "closed" }).eq("id", id); loadSessions(); }
async function deleteSession(id) { if(confirm("Löschen?")) { await sb.from("vote_sessions").delete().eq("id", id); loadSessions(); } }

function openGroupModal() { document.getElementById("groupModal").showModal(); document.getElementById("codesContainer").innerHTML = ""; }
function generateCode() { const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c = ''; for(let i=0; i<5; i++) c += chars.charAt(Math.floor(Math.random() * chars.length)); return c; }

async function createGroupAndCodes() {
  const name = document.getElementById("newGroupName").value.trim();
  const count = parseInt(document.getElementById("newGroupCount").value);
  if(!name || !count || count < 1) return alert("Eingaben prüfen.");
  const { data: gData } = await sb.from("voter_groups").insert({ name }).select().single();
  const ins = Array.from({length: count}).map(() => ({ group_id: gData.id, code: generateCode() }));
  await sb.from("voter_codes").insert(ins);
  document.getElementById("newGroupName").value = ""; document.getElementById("newGroupCount").value = "";
  await loadGroups(); document.getElementById("viewGroupSelect").value = gData.id; loadCodesForGroup();
}

async function loadCodesForGroup() {
  const gId = document.getElementById("viewGroupSelect").value; if(!gId) return;
  const { data } = await sb.from("voter_codes").select("code").eq("group_id", gId);
  document.getElementById("codesContainer").innerHTML = data.map(c => `<div class="code-badge">\${c.code}</div>`).join('');
}

init();
</script>
</body>
</html>
