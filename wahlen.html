<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Abstimmungen · FSBS</title>
<meta name="theme-color" content="#061827">
<link rel="stylesheet" href="/mobile-nav.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{
  /* Deep Dark macOS UI Design */
  --bg1: #061827; --bg2: #0A2235; --bg3: #04111C;
  --accent1: #f97316; --accent2: #a855f7;
  --glass: rgba(255,255,255,.05);
  --border: rgba(255,255,255,.12);
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.60);
  --shadow: 0 20px 55px rgba(0,0,0,.50);
  --ok: #3BD68A; --bad: #FF4D4D;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html, body{ min-height:100%; }
html{
  background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
  background-attachment: fixed;
}
body{
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text); padding:42px 16px 60px;
}

.app{ width:100%; max-width:1200px; margin: 0 auto; }
.top{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; }
h1{ font-size:32px; font-weight:800; letter-spacing:.4px; }
.subtitle{ color:var(--muted); font-size:14px; margin-top:6px; }

.glass{
  background:var(--glass); border:1px solid var(--border);
  border-radius:22px; box-shadow:var(--shadow);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}

button{
  border:none; cursor:pointer; border-radius:14px; padding:12px 18px;
  font-weight:600; font-family:inherit; font-size:14px;
  transition:transform .16s ease, filter .16s ease;
}
button:active{ transform:scale(.98); }
.btn-primary{ background:linear-gradient(135deg, var(--accent1), var(--accent2)); color:#000; font-weight:700; }
.btn-primary:hover{ filter:brightness(1.1); }
.btn-secondary{ background:rgba(255,255,255,.08); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover{ background:rgba(255,255,255,.12); }
.btn-danger{ background:rgba(255,77,77,.15); color:var(--bad); border:1px solid rgba(255,77,77,.3); }
.btn-sm{ padding:8px 14px; font-size:13px; border-radius:12px; }

.pageHeader{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; margin-top:30px; }
.sessionList{ display:flex; flex-direction:column; gap:14px; }
.sessionCard{
  padding:20px; border-radius:20px; background:rgba(255,255,255,.03);
  border:1px solid var(--border); backdrop-filter:blur(14px);
  transition:transform .16s ease;
}
.sessionCard:hover{ transform:translateY(-2px); background:rgba(255,255,255,.05); }
.sessionCardTop{ display:flex; justify-content:space-between; gap:12px; }
.sessionCardTitle{ font-size:18px; font-weight:800; margin-bottom:6px; }

/* Status Badges */
.statusBadge{ padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
.statusBadge.open{ background:rgba(59,214,138,.15); color:var(--ok); border:1px solid rgba(59,214,138,.3); }
.statusBadge.closed{ background:rgba(255,255,255,.08); color:var(--muted); border:1px solid var(--border); }

/* Modals */
dialog{ background:transparent; border:none; padding:0; max-width:520px; width:calc(100% - 32px); margin:auto; }
dialog::backdrop{ background:rgba(0,0,0,.7); backdrop-filter:blur(8px); }
.modalBox{ background:var(--bg2); border:1px solid var(--border); border-radius:22px; padding:24px; color:white; }
.modalTitle{ font-size:20px; font-weight:800; margin-bottom:20px; }

.formGroup{ margin-bottom:16px; }
.formLabel{ font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px; display:block; }
input[type=text], input[type=number], select {
  background:rgba(255,255,255,.05); border:1px solid var(--border); color:white;
  padding:12px 14px; border-radius:14px; width:100%; font-size:15px; outline:none;
}
input:focus, select:focus{ border-color:var(--accent1); background:rgba(255,255,255,.08); }

.optionsList{ display:flex; flex-direction:column; gap:8px; }
.optionRow{ display:flex; gap:8px; }
.optionRow input{ flex:1; }
.optionRemove{ background:rgba(255,77,77,.15); color:var(--bad); width:40px; border-radius:12px; }

/* Code Grid */
.code-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
.code-badge { background: rgba(255,255,255,.08); padding: 8px; border-radius: 8px; text-align: center; font-family: monospace; font-weight: 800; font-size: 16px; border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <h1>Abstimmungen</h1>
      <div class="subtitle">Wahlen & Berechtigungen verwalten</div>
    </div>
  </div>

  <div id="mainContent">
    <div class="pageHeader">
      <div style="display:flex; gap: 10px;">
        <button class="btn-primary" onclick="openCreateModal()">+ Neue Abstimmung</button>
        <button class="btn-secondary" onclick="openGroupModal()">👥 Gruppen & Codes</button>
      </div>
    </div>
    <div class="sessionList" id="sessionList">Lade...</div>
  </div>
</div>

<dialog id="createModal">
  <div class="modalBox">
    <div class="modalTitle">Neue Abstimmung</div>
    <div class="formGroup">
      <label class="formLabel">Titel</label>
      <input type="text" id="sessionTitle" placeholder="z.B. Wahl des Kassenwarts">
    </div>
    <div class="formGroup">
      <label class="formLabel">Wählergruppe</label>
      <select id="groupSelect">
        <option value="">Wird geladen...</option>
      </select>
      <div style="font-size:12px; color:var(--muted); margin-top:4px;">Nur Mitglieder dieser Gruppe können per 5-stelligem Code abstimmen.</div>
    </div>
    <div class="formGroup">
      <label class="formLabel">Optionen</label>
      <div class="optionsList" id="optionsList"></div>
      <button class="btn-secondary btn-sm" onclick="addOptionRow()" style="margin-top:8px;">+ Option</button>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <button class="btn-secondary" onclick="document.getElementById('createModal').close()">Abbrechen</button>
      <button class="btn-primary" id="saveSessionBtn">Abstimmung starten</button>
    </div>
  </div>
</dialog>

<dialog id="groupModal">
  <div class="modalBox" style="max-width: 600px;">
    <div class="modalTitle">Gruppen & Codes</div>
    
    <div class="formGroup" style="display:flex; gap:10px;">
      <input type="text" id="newGroupName" placeholder="Neue Gruppe (z.B. VV 2026)">
      <input type="number" id="newGroupCount" placeholder="Anzahl Codes" style="width: 120px;" min="1" max="200">
      <button class="btn-primary" onclick="createGroupAndCodes()">Erstellen</button>
    </div>
    
    <div class="formGroup">
      <label class="formLabel">Bestehende Gruppen</label>
      <select id="viewGroupSelect" onchange="loadCodesForGroup()"></select>
    </div>
    
    <div id="codesContainer" class="code-grid"></div>
    
    <div style="display:flex; justify-content:flex-end; margin-top:20px;">
      <button class="btn-secondary" onclick="document.getElementById('groupModal').close()">Schließen</button>
    </div>
  </div>
</dialog>

<script>
const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allSessions = [];
let allGroups = [];
let optionCount = 0;

// --- INITIAL LOAD ---
async function init() {
  await loadGroups();
  await loadSessions();
}

async function loadGroups() {
  const { data } = await sb.from("voter_groups").select("*").order("created_at", { ascending: false });
  allGroups = data || [];
  
  // Populate dropdowns
  const selCreate = document.getElementById("groupSelect");
  const selView = document.getElementById("viewGroupSelect");
  
  const optionsHtml = allGroups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
  selCreate.innerHTML = `<option value="" disabled selected>Bitte wählen</option>` + optionsHtml;
  selView.innerHTML = `<option value="" disabled selected>Gruppe wählen</option>` + optionsHtml;
}

// --- SESSIONS ---
async function loadSessions() {
  const { data } = await sb.from("vote_sessions").select("*, voter_groups(name)").order("created_at", { ascending: false });
  allSessions = data || [];
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById("sessionList");
  if (allSessions.length === 0) return list.innerHTML = `<div class="glass" style="text-align:center;">Keine Abstimmungen vorhanden.</div>`;
  
  list.innerHTML = allSessions.map(s => `
    <div class="sessionCard">
      <div class="sessionCardTop">
        <div>
          <div class="sessionCardTitle">${s.title}</div>
          <div style="display:flex; gap:10px; align-items:center; margin-top:8px;">
            <span class="statusBadge ${s.status === 'open' ? 'open' : 'closed'}">${s.status === 'open' ? '● Offen' : '● Geschlossen'}</span>
            <span style="font-size:12px; color:var(--muted);">Gruppe: <b>${s.voter_groups ? s.voter_groups.name : 'Keine'}</b></span>
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          ${s.status === 'open' ? `<button class="btn-secondary btn-sm" onclick="closeSession('${s.id}')">🔒 Schließen</button>` : ''}
          <button class="btn-danger btn-sm" onclick="deleteSession('${s.id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

// --- CREATE SESSION ---
function openCreateModal() {
  document.getElementById("sessionTitle").value = "";
  document.getElementById("optionsList").innerHTML = "";
  optionCount = 0;
  addOptionRow(); addOptionRow();
  document.getElementById("createModal").showModal();
}

function addOptionRow() {
  const div = document.createElement("div"); div.className = "optionRow";
  div.innerHTML = `<input type="text" placeholder="Option"><button class="optionRemove" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById("optionsList").appendChild(div);
}

document.getElementById("saveSessionBtn").addEventListener("click", async () => {
  const title = document.getElementById("sessionTitle").value.trim();
  const groupId = document.getElementById("groupSelect").value;
  const opts = Array.from(document.querySelectorAll(".optionRow input")).map(i => i.value.trim()).filter(Boolean);
  
  if (!title || !groupId || opts.length < 2) return alert("Bitte Titel, Gruppe und mind. 2 Optionen eingeben.");
  
  document.getElementById("saveSessionBtn").textContent = "Speichere...";
  await sb.from("vote_sessions").insert({ title, options: opts, group_id: groupId });
  
  document.getElementById("createModal").close();
  document.getElementById("saveSessionBtn").textContent = "Abstimmung starten";
  await loadSessions();
});

async function closeSession(id) {
  await sb.from("vote_sessions").update({ status: "closed" }).eq("id", id);
  loadSessions();
}
async function deleteSession(id) {
  if(confirm("Löschen?")) { await sb.from("vote_sessions").delete().eq("id", id); loadSessions(); }
}

// --- GROUP & CODE MANAGEMENT ---
function openGroupModal() {
  document.getElementById("groupModal").showModal();
  document.getElementById("codesContainer").innerHTML = "";
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Keine Verwechslung I/1, O/0
  let code = '';
  for(let i=0; i<5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
  return code;
}

async function createGroupAndCodes() {
  const name = document.getElementById("newGroupName").value.trim();
  const count = parseInt(document.getElementById("newGroupCount").value);
  
  if(!name || !count || count < 1) return alert("Name und Anzahl eingeben.");
  
  // 1. Gruppe erstellen
  const { data: groupData } = await sb.from("voter_groups").insert({ name }).select().single();
  
  // 2. Codes generieren
  const codesToInsert = Array.from({length: count}).map(() => ({
    group_id: groupData.id,
    code: generateCode()
  }));
  
  await sb.from("voter_codes").insert(codesToInsert);
  
  document.getElementById("newGroupName").value = "";
  document.getElementById("newGroupCount").value = "";
  await loadGroups();
  document.getElementById("viewGroupSelect").value = groupData.id;
  loadCodesForGroup();
}

async function loadCodesForGroup() {
  const groupId = document.getElementById("viewGroupSelect").value;
  if(!groupId) return;
  
  const { data } = await sb.from("voter_codes").select("code").eq("group_id", groupId);
  const container = document.getElementById("codesContainer");
  
  container.innerHTML = data.map(c => `<div class="code-badge">${c.code}</div>`).join('');
}

init();
</script>
</body>
</html>
